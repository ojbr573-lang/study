<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد الدراسة الذكي</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .btn-sync { background: #4285F4; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-sync:hover { background: #357abd; }
        #status { margin-top: 15px; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>تطوير البيج: المزامنة المباشرة</h2>
    <p>أضف موعدك وسينتقل لتقويم هاتفك فوراً</p>
    
    <input type="text" id="eventTitle" placeholder="اسم المادة أو الامتحان">
    <input type="datetime-local" id="eventTime">
    
    <button class="btn-sync" onclick="handleAuthClick()">حفظ في تقويم جوجل مباشرة 🚀</button>
    
    <div id="status">جاهز للربط السحابي...</div>
</div>

<script>
    const CLIENT_ID = '923391113467-5ur27mjjncbjrjfs20gclt8690muuolg.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyA6V8dDPLzND5wf2Q_wAKBQVlpQBI4z590';
    const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest";
    const SCOPES = "https://www.googleapis.com/auth/calendar.events";

    let tokenClient;
    let gapiInited = false;
    let gsiInited = false;

    function gapiLoaded() { gapi.load('client', intializeGapiClient); }
    async function intializeGapiClient() {
        await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
        gapiInited = true;
    }
    function gsiLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES, callback: '', 
        });
        gsiInited = true;
    }

    function handleAuthClick() {
        tokenClient.callback = async (resp) => {
            if (resp.error !== undefined) throw (resp);
            await addEventToCalendar();
        };

        if (gapi.client.getToken() === null) {
            tokenClient.requestAccessToken({prompt: 'consent'});
        } else {
            tokenClient.requestAccessToken({prompt: ''});
        }
    }

    async function addEventToCalendar() {
        const title = document.getElementById('eventTitle').value;
        const startTime = document.getElementById('eventTime').value;

        if (!title || !startTime) {
            alert("يرجى تعبئة البيانات أولاً");
            return;
        }

        const event = {
            'summary': title,
            'start': { 'dateTime': new Date(startTime).toISOString(), 'timeZone': 'Asia/Amman' },
            'end': { 'dateTime': new Date(new Date(startTime).getTime() + 3600000).toISOString(), 'timeZone': 'Asia/Amman' }
        };

        try {
            const response = await gapi.client.calendar.events.insert({ 'calendarId': 'primary', 'resource': event });
            document.getElementById('status').innerText = "✅ تم الحفظ في تقويمك بنجاح!";
            alert("تمت الإضافة! تفقد تقويم هاتفك الآن.");
        } catch (err) {
            document.getElementById('status').innerText = "❌ خطأ في المزامنة.";
            console.error(err);
        }
    }
</script>

<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gsiLoaded()"></script>

</body>
</html>
