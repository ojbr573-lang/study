<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مذاكرتي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
/* === كل الـ CSS القديم اللي عندك (ما غيرته) === */
:root{--bg:#0a0b14;--card:#12141f;--card2:#1a1d2e;--accent:#7c6fff;--a2:#ff5f7e;--a3:#3dd68c;--warn:#ffb84d;--blue:#4da6ff;--text:#eeeef5;--muted:#6b6b8a;--border:#22253a;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;overflow:hidden;}
/* ... (ضع هنا كل الـ CSS اللي كان عندك من قبل كامل بدون تغيير) ... */
/* أضفت فقط هذه الستايلات الجديدة للعادات */
.habit-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;display:flex;gap:12px;}
.habit-ico{font-size:1.8rem;flex-shrink:0;}
.habit-info{flex:1;}
.habit-name{font-weight:700;font-size:1rem;}
.habit-times{font-size:0.85rem;color:var(--muted);}
</style>
</head>
<body>
<div id="app">
  <!-- HOME + SUBJECTS + REMINDERS panels (نفس الكود القديم) -->
  <!-- ... (كل الـ HTML اللي كان عندك من قبل) ... -->

  <!-- التبويب الجديد: عادات يومية -->
  <div id="p-habits" class="panel">
    <div class="topbar">
      <h1>🦷 عادات يومية</h1>
      <button class="add-btn" onclick="openHabitModal()">+</button>
    </div>
    <div id="habits-list"></div>
    <button onclick="generateFullICS()" class="sub-btn" style="margin:20px 14px 10px;">📅 أنشئ ملف ICS كامل (تذكيرات + عادات)</button>
  </div>
</div>

<!-- Bottom Nav مع تبويب جديد -->
<div id="nav">
  <button class="nb" onclick="goTo('home')"><span class="ni">🏠</span>الرئيسية</button>
  <button class="nb" onclick="goTo('subjects')"><span class="ni">📖</span>المواد</button>
  <button class="nb" onclick="goTo('reminders')"><span class="ni">🔔</span>التذكيرات</button>
  <button class="nb on" onclick="goTo('habits')"><span class="ni">🦷</span>عادات</button>
</div>

<!-- Habit Modal -->
<div class="overlay" id="ov-h" onclick="if(event.target.id==='ov-h')closeOv('ov-h')">
  <div class="modal">
    <div class="handle"></div>
    <div class="modal-title">➕ إضافة عادة يومية</div>
    <div class="field"><label>اسم العادة</label><input class="fi" id="h-name" placeholder="مثال: تفريش الأسنان"></div>
    <div class="field"><label>الوقت الأول (صباحي)</label><input class="fi" type="time" id="h-time1" value="07:30"></div>
    <div class="field"><label>الوقت الثاني (مسائي)</label><input class="fi" type="time" id="h-time2" value="22:00"></div>
    <button class="sub-btn" onclick="saveHabit()">💾 حفظ العادة</button>
  </div>
</div>

<script>
// === كل الكود القديم اللي عندك (STATE + buildStages + ICS + renderAll ... إلخ) ===
// (انسخ كل الـ script اللي كان عندك من قبل هنا)

// === الجزء الجديد: Daily Habits ===
const HKEY = 'mz5-h';
let H = JSON.parse(localStorage.getItem(HKEY) || '[]');

// عادة تفريش الأسنان الافتراضية (طبيعية)
if (H.length === 0) {
  H = [{
    id: Date.now(),
    name: "🦷 تفريش الأسنان",
    times: ["07:30", "22:00"],
    emoji: "🦷"
  }];
  localStorage.setItem(HKEY, JSON.stringify(H));
}

function openHabitModal(editId = null) {
  // يمكن إضافة تعديل لاحقاً
  document.getElementById('ov-h').classList.add('on');
}

function saveHabit() {
  const name = document.getElementById('h-name').value.trim() || "عادة جديدة";
  const t1 = document.getElementById('h-time1').value;
  const t2 = document.getElementById('h-time2').value;
  const times = [];
  if (t1) times.push(t1);
  if (t2) times.push(t2);

  H.push({
    id: Date.now(),
    name,
    times,
    emoji: "✅"
  });

  localStorage.setItem(HKEY, JSON.stringify(H));
  closeOv('ov-h');
  renderHabits();
}

function renderHabits() {
  const container = document.getElementById('habits-list');
  if (!H.length) {
    container.innerHTML = `<div class="empty"><div class="ei">🦷</div><p>لا توجد عادات بعد</p></div>`;
    return;
  }
  container.innerHTML = H.map(h => `
    <div class="habit-card">
      <div class="habit-ico">${h.emoji}</div>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="habit-times">⏰ ${h.times.join(' • ')}</div>
      </div>
    </div>
  `).join('');
}

// توليد ICS كامل (تذكيرات + عادات يومية متكررة)
function generateFullICS() {
  let ics = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//مذاكرتي//AR
`;

  // 1. التذكيرات الدراسية (نفس الدالة القديمة)
  R.forEach(r => {
    const stages = r.stages || buildStages(r);
    stages.forEach(st => {
      ics += makeSingleEventICS(st);
    });
  });

  // 2. العادات اليومية (متكررة يوميًا)
  H.forEach(h => {
    h.times.forEach(time => {
      ics += `BEGIN:VEVENT
UID:${Date.now()}-${h.id}-${time}@mz
SUMMARY:${h.name}
DTSTART;TZID=Asia/Amman:20260408T${time.replace(':','')}
RRULE:FREQ=DAILY
DESCRIPTION:عادة يومية - ${h.name}
END:VEVENT
`;
    });
  });

  ics += `END:VCALENDAR`;

  const blob = new Blob([ics], {type: 'text/calendar'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'مذاكرتي_كامل.ics';
  a.click();
  URL.revokeObjectURL(url);

  alert('✅ تم إنشاء ملف ICS كامل!\nافتحه في Google Calendar أو Apple Calendar');
}

function makeSingleEventICS(st) {
  // دالة مساعدة بسيطة (يمكنك دمجها مع makeICS القديمة)
  return `BEGIN:VEVENT
SUMMARY:${st.title}
DTSTART;TZID=Asia/Amman:${st.date.replace(/-/g,'')}T${(st.time||'09:00').replace(':','')}
DTEND;TZID=Asia/Amman:${st.date.replace(/-/g,'')}T${(st.time ? (parseInt(st.time.split(':')[0])+1)+':00' : '10:00').replace(':','')}
DESCRIPTION:${st.desc||''}
END:VEVENT
`;
}

// طلب إذن الإشعارات
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

// تحديث الـ renderAll ليشمل العادات
const oldRenderAll = renderAll;
renderAll = function() {
  oldRenderAll();
  if (curTab === 'habits') renderHabits();
};

// تهيئة أولية
window.onload = () => {
  renderAll();
  renderHabits();
  goTo('home'); // ابدأ في الرئيسية
};
</script>
</body>
</html>
