<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مذاكرتي - MyStudyApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --primary-dark: #3730a3;
            --secondary: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f172a;
            --bg2: #1e293b;
            --bg3: #334155;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #64748b;
            --radius: 14px;
            --radius-sm: 8px;
            --font: 'Cairo', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            direction: rtl;
            max-width: 520px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== التنسيقات العامة ===== */
        .container {
            padding: 16px;
            padding-bottom: 84px;
        }

        .card {
            background: var(--bg2);
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--bg3);
            margin-bottom: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            cursor: pointer;
            border: none;
            font-family: var(--font);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            font-size: 0.95rem;
            text-decoration: none;
        }

        .btn:active { transform: scale(0.96); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary { background: var(--primary); color: white; border-radius: var(--radius-sm); padding: 10px 18px; font-weight: 700; width: 100%; }
        .btn-secondary { background: var(--bg3); color: var(--text); border-radius: var(--radius-sm); padding: 10px 18px; width: 100%; }
        .btn-danger { background: var(--danger); color: white; border-radius: var(--radius-sm); padding: 8px 12px; font-size: 0.85rem; }
        .btn-icon { background: var(--bg3); color: var(--text); width: 36px; height: 36px; border-radius: 50%; padding: 0; }

        .input-field {
            background: var(--bg3);
            color: var(--text);
            border: 1px solid var(--bg3);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            width: 100%;
            font-family: var(--font);
            margin-bottom: 12px;
        }

        .input-field:focus { border-color: var(--primary-light); outline: none; }

        label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: var(--text2); }

        /* ===== شريط التنقل السفلي ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 520px;
            height: 68px;
            background: var(--bg2);
            border-top: 1px solid var(--bg3);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-item {
            color: var(--text3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 0.68rem;
            text-decoration: none;
            flex: 1;
            cursor: pointer;
        }

        .nav-item.active { color: var(--primary-light); }
        .nav-item span:first-child { font-size: 1.4rem; }

        /* ===== الهيدر ===== */
        header {
            padding: 20px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary-light); }
        .user-badge { font-size: 0.8rem; color: var(--text2); background: var(--bg2); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--bg3); }

        /* ===== الإحصائيات ===== */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
        .stat-card { background: var(--bg2); padding: 12px; border-radius: var(--radius); border: 1px solid var(--bg3); text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--primary-light); }
        .stat-label { font-size: 0.75rem; color: var(--text2); }

        /* ===== التذكيرات القادمة ===== */
        .reminder-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--bg3); }
        .reminder-item:last-child { border-bottom: none; }
        .reminder-info h4 { font-size: 0.95rem; font-weight: 600; }
        .reminder-info p { font-size: 0.75rem; color: var(--text2); }
        .badge { font-size: 0.8rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
        .badge-urgent { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .badge-soon { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .badge-later { background: rgba(16, 185, 129, 0.2); color: var(--success); }

        /* ===== المواد ===== */
        .subject-card { position: relative; overflow: hidden; }
        .subject-color-bar { position: absolute; top: 0; right: 0; width: 6px; height: 100%; }
        .subject-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .subject-title { font-weight: 700; font-size: 1.1rem; }
        .progress-container { height: 8px; background: var(--bg3); border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); transition: width 0.3s; }
        .chapter-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 0.9rem; }
        .checkbox { width: 20px; height: 20px; border: 2px solid var(--bg3); border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .checkbox.checked { background: var(--success); border-color: var(--success); }
        .checkbox.checked::after { content: '✓'; color: white; font-size: 12px; font-weight: bold; }
        .chapter-name.done { text-decoration: line-through; color: var(--text3); }

        /* ===== التذكيرات ===== */
        .timeline { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
        .stage-item { display: flex; align-items: center; gap: 12px; padding: 8px; background: rgba(255, 255, 255, 0.03); border-radius: var(--radius-sm); }
        .stage-date { font-size: 0.75rem; color: var(--text2); min-width: 80px; }

        /* ===== العادات ===== */
        .habit-progress-banner { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 16px; border-radius: var(--radius); margin-bottom: 16px; text-align: center; }
        .habit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 12px; }
        .habit-time-btn { background: var(--bg3); border: 1px solid transparent; padding: 8px; border-radius: var(--radius-sm); font-size: 0.8rem; text-align: center; cursor: pointer; }
        .habit-time-btn.done { background: rgba(16, 185, 129, 0.2); border-color: var(--success); color: var(--success); }

        /* ===== المودال ===== */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal { background: var(--bg2); width: 100%; max-width: 400px; border-radius: var(--radius); padding: 24px; border: 1px solid var(--bg3); max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-weight: 800; font-size: 1.2rem; }

        /* ===== التوست ===== */
        .toast { position: fixed; top: 16px; right: 16px; padding: 12px 16px; border-radius: var(--radius-sm); font-weight: 700; z-index: 9999; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-success { background: var(--success); color: white; }
        .toast-danger { background: var(--danger); color: white; }
        .toast-warning { background: var(--warning); color: white; }
        .toast-info { background: var(--primary); color: white; }

        /* ===== الألوان ===== */
        .color-picker { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px; }
        .color-option { height: 32px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
        .color-option.selected { border-color: white; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); }
        .empty-state span { font-size: 3rem; display: block; margin-bottom: 16px; }

        .login-banner { background: rgba(79, 70, 229, 0.1); border: 1px dashed var(--primary); padding: 12px; border-radius: var(--radius-sm); text-align: center; font-size: 0.85rem; margin-bottom: 16px; color: var(--primary-light); }

        /* ===== ENHANCEMENT 3: Loading Screen Animation ===== */
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- ===== ENHANCEMENT 3: Loading Screen ===== -->
    <div id="loading-screen" style="
        position:fixed; inset:0; background:var(--bg); z-index:9999;
        display:flex; flex-direction:column; align-items:center; 
        justify-content:center; gap:16px;
        font-family:var(--font);
    ">
        <div style="font-size:3rem;">📖</div>
        <div style="font-size:1.4rem; font-weight:800; color:var(--primary-light);">مذاكرتي</div>
        <div style="
            width:48px; height:48px; border:4px solid var(--bg3);
            border-top-color:var(--primary); border-radius:50%;
            animation:spin 0.8s linear infinite;
        "></div>
        <div style="font-size:0.85rem; color:var(--text2);" id="loading-text">جاري التحميل...</div>
    </div>

    <!-- ===== ENHANCEMENT 4: Offline Banner ===== -->
    <div id="offline-banner" style="
        display:none; position:fixed; top:0; left:0; right:0;
        background:var(--warning); color:#1a1a1a; text-align:center;
        padding:8px; font-size:0.82rem; font-weight:700; z-index:8000;
    ">
        ⚠️ لا يوجد اتصال بالإنترنت — البيانات محفوظة محلياً
    </div>

    <header>
        <div class="logo">مذاكرتي</div>
        <div id="auth-header-info"></div>
    </header>

    <div id="app-content" class="container">
        <!-- المحتوى سيتم توليده هنا -->
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="navigate('home')">
            <span>🏠</span>
            <span>الرئيسية</span>
        </div>
        <div class="nav-item" onclick="navigate('subjects')">
            <span>📚</span>
            <span>المواد</span>
        </div>
        <div class="nav-item" onclick="navigate('reminders')">
            <span>🔔</span>
            <span>التذكيرات</span>
        </div>
        <div class="nav-item" onclick="navigate('habits')">
            <span>🦷</span>
            <span>عادات</span>
        </div>
    </nav>

    <!-- مودال عام -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeModalIfOverlay(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- توست -->
    <div id="toast-container"></div>

    <script>
        // ===== ENHANCEMENT 1: Debounce Sync =====
        let syncDebounceTimer = null;

        function debouncedSync() {
            clearTimeout(syncDebounceTimer);
            syncDebounceTimer = setTimeout(() => {
                syncToCloud(true);
            }, 2000); // wait 2 seconds after last change
        }

        // ===== ENHANCEMENT 4: Offline Listeners =====
        window.addEventListener('online', () => {
            document.getElementById('offline-banner').style.display = 'none';
            if (state.user) syncToCloud(true); // auto-sync when back online
        });
        
        window.addEventListener('offline', () => {
            document.getElementById('offline-banner').style.display = 'block';
        });

        /*
          ===== تعليمات تحديث GAS Script =====
          
          لكي تعمل مزامنة التقويم بشكل صحيح، يجب أن يكون GAS script كالتالي:
          
          function doPost(e) {
            try {
              var data = JSON.parse(e.postData.contents);
              var SECRET = "YOUR_SECRET_HERE"; // غيّرها
              if (data.secret !== SECRET) return respond({result:'error',error:'Unauthorized'});
              
              var startTime = new Date(data.startTime);
              var endTime = new Date(startTime.getTime() + (data.durationMinutes||60)*60000);
              var calendar = CalendarApp.getDefaultCalendar();
              var event = calendar.createEvent(data.title, startTime, endTime, {
                description: data.description || 'مذاكرتي'
              });
              event.addPopupReminder(data.reminderMinutes || 10);
              return respond({result:'success'});
            } catch(err) {
              return respond({result:'error', error:err.toString()});
            }
          }
          function respond(obj) {
            return ContentService
              .createTextOutput(JSON.stringify(obj))
              .setMimeType(ContentService.MimeType.JSON);
          }
          
          ملاحظة: بسبب CORS، نستخدم mode:'no-cors' في الـ fetch
          يعني الطلب يصل لـ GAS لكن لا نقدر نقرأ الـ response
          تحقق من تقويم Google مباشرة للتأكد من وصول الأحداث
        */

        // ===== الإعدادات الثابتة =====
        const SUPABASE_URL = 'https://llumspntrtdgwmodpmyc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_FXUJGp0pX57KCkdMyQWj5A_xEbKkIfD';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const STORAGE_KEYS = {
            subjects: 'mthakrti_subjects',
            reminders: 'mthakrti_reminders',
            habits: 'mthakrti_habits',
            habitLogs: 'mthakrti_habitLogs',
            gasConfig: 'mthakrti_gasConfig'
        };

        const SUBJECT_COLORS = ['#4f46e5', '#06b6d4', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#8b5cf6', '#f97316', '#14b8a6', '#6366f1'];

        // ===== حالة التطبيق =====
        let state = {
            currentPage: 'home',
            user: null,
            subjects: [],
            reminders: [],
            habits: [],
            habitLogs: {},
            gasConfig: { url: '', secret: '' },

            save() {
                localStorage.setItem(STORAGE_KEYS.subjects, JSON.stringify(this.subjects));
                localStorage.setItem(STORAGE_KEYS.reminders, JSON.stringify(this.reminders));
                localStorage.setItem(STORAGE_KEYS.habits, JSON.stringify(this.habits));
                localStorage.setItem(STORAGE_KEYS.habitLogs, JSON.stringify(this.habitLogs));
                localStorage.setItem(STORAGE_KEYS.gasConfig, JSON.stringify(this.gasConfig));
            },

            loadFromLocal() {
                this.subjects = JSON.parse(localStorage.getItem(STORAGE_KEYS.subjects)) || [];
                this.reminders = JSON.parse(localStorage.getItem(STORAGE_KEYS.reminders)) || [];
                this.habits = JSON.parse(localStorage.getItem(STORAGE_KEYS.habits)) || [
                    { id: 'default-1', name: '🦷 تفريش الأسنان', times: ['07:30', '22:00'] }
                ];
                this.habitLogs = JSON.parse(localStorage.getItem(STORAGE_KEYS.habitLogs)) || {};
                this.gasConfig = JSON.parse(localStorage.getItem(STORAGE_KEYS.gasConfig)) || { url: '', secret: '' };
            },

            getPackage() {
                return {
                    subjects: this.subjects,
                    reminders: this.reminders,
                    habits: this.habits,
                    habitLogs: this.habitLogs
                };
            },

            applyPackage(pkg) {
                // ===== FIX: Bug 4 =====
                if (!pkg) return;
                this.subjects = pkg.subjects || [];
                this.reminders = pkg.reminders || [];
                this.habits = pkg.habits && pkg.habits.length > 0 
                    ? pkg.habits 
                    : [{ id: 'default-1', name: '🦷 تفريش الأسنان', times: ['07:30', '22:00'] }];
                
                // Merge habitLogs: keep cloud data but don't overwrite today's local logs
                const today = new Date().toISOString().split('T')[0];
                const localToday = this.habitLogs[today] || {};
                this.habitLogs = pkg.habitLogs || {};
                if (Object.keys(localToday).length > 0) {
                    this.habitLogs[today] = localToday;
                }
            }
        };

        // ===== FIX 5: Habit Logs Cleanup =====
        function cleanOldLogs() {
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - 30);
            Object.keys(state.habitLogs).forEach(date => {
                if (new Date(date) < cutoff) {
                    delete state.habitLogs[date];
                }
            });
        }

        // ===== تهيئة التطبيق =====
        async function init() {
            // ===== ENHANCEMENT 3: Show Loading Screen =====
            const loadingScreen = document.getElementById('loading-screen');
            const loadingText = document.getElementById('loading-text');
            loadingScreen.style.display = 'flex';
            loadingScreen.style.opacity = '1';

            try {
                loadingText.textContent = 'جاري التحقق من الجلسة...';
                const { data: { session } } = await sb.auth.getSession();
                if (session) {
                    state.user = session.user;
                    loadingText.textContent = 'جاري تحميل البيانات...';
                    await loadFromCloud();
                } else {
                    clearLocalData();
                }
                updateAuthUI();
                renderAll();
                requestNotificationPermission();
                startNotificationCheck();
            } catch (e) {
                console.error('Init Error:', e);
                renderAll();
            } finally {
                // ===== ENHANCEMENT 3: Hide Loading Screen =====
                loadingScreen.style.opacity = '0';
                loadingScreen.style.transition = 'opacity 0.3s';
                setTimeout(() => loadingScreen.style.display = 'none', 300);
            }
        }

        // ===== إدارة المصادقة =====
        sb.auth.onAuthStateChange(async (event, session) => {
            if (event === 'SIGNED_IN') {
                state.user = session.user;
                clearLocalData();
                await loadFromCloud();
            } else if (event === 'SIGNED_OUT') {
                state.user = null;
                clearLocalData();
            }
            updateAuthUI();
            renderAll();
        });

        function clearLocalData() {
            localStorage.removeItem(STORAGE_KEYS.subjects);
            localStorage.removeItem(STORAGE_KEYS.reminders);
            localStorage.removeItem(STORAGE_KEYS.habits);
            localStorage.removeItem(STORAGE_KEYS.habitLogs);
            localStorage.removeItem(STORAGE_KEYS.gasConfig);
            state.subjects = [];
            state.reminders = [];
            state.habits = [];
            state.habitLogs = {};
            state.gasConfig = { url: '', secret: '' };
        }

        async function loadFromCloud() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) return;
            try {
                const { data, error } = await sb
                    .from('user_configs')
                    .select('*')
                    .eq('user_id', user.id)
                    .single();

                if (error && error.code !== 'PGRST116') {
                    console.error('loadFromCloud error:', error);
                    return;
                }

                if (data) {
                    if (data.study_data) state.applyPackage(data.study_data);
                    if (data.script_url) {
                        try { state.gasConfig = JSON.parse(data.script_url); }
                        catch { state.gasConfig = { url: data.script_url, secret: '' }; }
                    }
                    state.save();
                } else {
                    // أول مرة للمستخدم، نضع العادات الافتراضية
                    state.habits = [{ id: 'default-1', name: '🦷 تفريش الأسنان', times: ['07:30', '22:00'] }];
                    state.save();
                }
            } catch (e) {
                console.error('loadFromCloud exception:', e);
            }
        }

        // ===== FIX 2: Silent Sync Parameter =====
        async function syncToCloud(silent = false) {
            // ===== ENHANCEMENT 4: Offline Check =====
            if (!navigator.onLine) {
                if (!silent) showToast('لا يوجد اتصال — تم الحفظ محلياً فقط', 'warning');
                return;
            }

            const { data: { user } } = await sb.auth.getUser();
            if (!user) { if (!silent) openAuthModal(); return; }

            // ===== FIX 3: Verification =====
            // syncToCloud does NOT call renderAll() to avoid flicker.
            
            if (!silent) showToast('جاري المزامنة...', 'info');
            try {
                // ===== FIX 5: Call Cleanup =====
                cleanOldLogs();

                const payload = {
                    user_id: user.id,
                    script_url: JSON.stringify(state.gasConfig),
                    study_data: state.getPackage()
                };

                const { error: upsertError } = await sb
                    .from('user_configs')
                    .upsert(payload, { onConflict: 'user_id' });

                if (upsertError) throw upsertError;

                // التحقق من الحفظ (BUG 2 FIX)
                const { data: verify, error: verifyError } = await sb
                    .from('user_configs')
                    .select('study_data')
                    .eq('user_id', user.id)
                    .single();

                if (verifyError || !verify) throw new Error('فشل التحقق من الحفظ السحابي');

                if (!silent) showToast('تمت المزامنة ✅', 'success');
            } catch (e) {
                console.error('syncToCloud error:', e);
                if (!silent) showToast('فشلت المزامنة: ' + e.message, 'danger');
            }
        }

        function updateAuthUI() {
            const headerInfo = document.getElementById('auth-header-info');
            if (state.user) {
                headerInfo.innerHTML = `
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span class="user-badge">${state.user.email}</span>
                        <button class="btn btn-icon" onclick="handleLogout()" title="خروج">🚪</button>
                    </div>
                `;
            } else {
                headerInfo.innerHTML = `
                    <button class="btn btn-primary" style="width:auto; padding:6px 12px; font-size:0.8rem;" onclick="openAuthModal()">دخول</button>
                `;
            }
        }

        function openAuthModal(mode = 'login') {
            // ===== ENHANCEMENT 2: Confirm Password on Signup =====
            showModal(`
                <div class="modal-header">

        async function handleLogin() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if (!email || !password) return showToast('يرجى ملء كافة الحقول', 'warning');

            try {
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw error;
                showToast('تم تسجيل الدخول بنجاح', 'success');
                closeModal();
            } catch (e) {
                showToast(e.message, 'danger');
            }
        }

        async function handleSignUp() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            
            // ===== ENHANCEMENT 2: Password Confirmation Validation =====
            const confirmPass = document.getElementById('auth-confirm-password')?.value;
            if (confirmPass !== undefined && password !== confirmPass) {
                showToast('كلمة المرور وتأكيدها غير متطابقين', 'warning');
                return;
            }

            if (!email || !password) return showToast('يرجى ملء كافة الحقول', 'warning');

            try {
                const { error } = await sb.auth.signUp({ email, password });
                if (error) {
                    // ===== FIX 1: Rate Limit Check =====
                    if (error.status === 429 || 
                        error.message.toLowerCase().includes('rate limit') ||
                        error.message.toLowerCase().includes('over_email_send_rate_limit')) {
                        showToast('تم تجاوز الحد المسموح. انتظر ساعة وحاول مجدداً', 'warning');
                    } else {
                        throw error;
                    }
                    return;
                }
                showToast('تم إنشاء الحساب! تحقق من بريدك الإلكتروني', 'success');
                
                // محاولة دخول تلقائي
                const { error: loginErr } = await sb.auth.signInWithPassword({ email, password });
                if (!loginErr) closeModal();
            } catch (e) {
                showToast(e.message, 'danger');
            }
        }

        async function handleLogout() {
            try {
                await sb.auth.signOut();
                showToast('تم تسجيل الخروج', 'info');
            } catch (e) {
                showToast(e.message, 'danger');
            }
        }

        function renderUpcomingReminders() {
            const list = document.getElementById('upcoming-reminders-list');
            if (!list) return;
            const now = new Date();
            now.setHours(0,0,0,0);
            
            let allStages = [];
            state.reminders.forEach(rem => {
                const stages = generateStages(rem.date, rem.type);
                stages.forEach((s, idx) => {
                    const stageDate = new Date(s.date);
                    stageDate.setHours(0,0,0,0);
                    if (stageDate >= now && (!rem.doneStages || !rem.doneStages.includes(idx))) {
                        allStages.push({ title: rem.name, stageName: s.label, date: stageDate, remId: rem.id });
                    }
                });
            });

            allStages.sort((a, b) => a.date - b.date);
            const top5 = allStages.slice(0, 5);

            if (top5.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:var(--text3); font-size:0.9rem;">لا توجد تذكيرات قادمة</p>';
                return;
            }

            top5.forEach(s => {
                const diffTime = s.date - now;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                let badgeClass = 'badge-later';
                if (diffDays <= 2) badgeClass = 'badge-urgent';
                else if (diffDays <= 5) badgeClass = 'badge-soon';

                const div = document.createElement('div');
                div.className = 'reminder-item';
                div.innerHTML = `
                    <div class="reminder-info">
                        <h4>${s.title}</h4>
                        <p>${s.stageName} - ${s.date.toLocaleDateString('ar-EG')}</p>
                    </div>
                    <div class="badge ${badgeClass}">${diffDays === 0 ? 'اليوم' : diffDays + ' أيام'}</div>
                `;
                list.appendChild(div);
            });
        }

            });

        function generateStages(dateStr, type) {
            const targetDate = new Date(dateStr);
            const stages = [];
            const dayMs = 24 * 60 * 60 * 1000;
            const addStage = (daysBefore, label) => {
                const d = new Date(targetDate.getTime() - daysBefore * dayMs);
                stages.push({ date: d.toISOString().split('T')[0], label });
            };
            if (type === 'exam') [14, 7, 3, 1].forEach(d => addStage(d, `مراجعة قبل ${d} أيام`));
            else if (type === 'quiz') [3, 1].forEach(d => addStage(d, `مراجعة قبل ${d} أيام`));
            else if (type === 'assignment') [7, 3, 1].forEach(d => addStage(d, `عمل قبل ${d} أيام`));
            else addStage(2, 'تذكير نهائي');
            stages.push({ date: dateStr, label: 'اليوم الموعود 🎯' });
            return stages;
        }

                <input type="text" id="new-habit-name" class="input-field" placeholder="مثلاً: قراءة كتاب">
                <label>الأوقات (HH:MM)</label>
                <div id="habit-times-container"><input type="time" class="input-field habit-time-input"></div>
                <button class="btn btn-secondary" style="margin-bottom:12px; font-size:0.8rem;" onclick="addTimeInput()">+ إضافة وقت آخر</button>
                <button class="btn btn-primary" onclick="addHabit()">إضافة</button>
            `);
        }

        function addTimeInput() {
            const container = document.getElementById('habit-times-container');
            const input = document.createElement('input');
            input.type = 'time'; input.className = 'input-field habit-time-input';
            container.appendChild(input);
        }

        async function addHabit() {
            const name = document.getElementById('new-habit-name').value.trim();
            const times = Array.from(document.querySelectorAll('.habit-time-input')).map(i => i.value).filter(v => v);
            if (!name || times.length === 0) return showToast('يرجى إدخال الاسم ووقت واحد على الأقل', 'warning');
            const newHabit = { id: Date.now().toString(), name, times };
            state.habits.push(newHabit);
            state.save();
            closeModal();
            renderAll();
            // ===== ENHANCEMENT 1: Debounced Sync =====
            debouncedSync();
        }

        async function deleteHabit(id) {
            if (confirm('هل أنت متأكد من حذف هذه العادة؟')) {
                state.habits = state.habits.filter(h => h.id !== id);
                state.save();
                renderAll();
                // ===== ENHANCEMENT 1: Debounced Sync =====
                debouncedSync();
            }
        }

        async function toggleHabitLog(habitId, timeIdx) {
            const today = new Date().toISOString().split('T')[0];
            if (!state.habitLogs[today]) state.habitLogs[today] = {};
            if (!state.habitLogs[today][habitId]) state.habitLogs[today][habitId] = [];
            const logs = state.habitLogs[today][habitId];
            if (logs.includes(timeIdx)) state.habitLogs[today][habitId] = logs.filter(i => i !== timeIdx);
            else state.habitLogs[today][habitId].push(timeIdx);
            state.save();
            renderAll();
            // ===== ENHANCEMENT 1: Debounced Sync =====
            debouncedSync();
        }

        // ===== إعدادات GAS =====
        async function saveGasConfig() {
            const url = document.getElementById('input-gas-url').value.trim();
            const secret = document.getElementById('input-gas-secret').value.trim();
            
            // ===== ADDITIONAL FIX: GAS URL Validation =====
            if (url && !url.includes('script.google.com')) {
                showToast('الرابط يجب أن يكون رابط Google Apps Script صحيح', 'warning');
                return;
            }

            state.gasConfig = { url, secret };
            state.save();
            await syncToCloud();
        }

        // ===== ENHANCEMENT 5: Delete Account Function =====
        async function handleDeleteAccount() {
            const confirmed = confirm(
                'هل أنت متأكد تماماً من حذف حسابك؟\n' +
                'سيتم حذف جميع بياناتك من قاعدة البيانات بشكل نهائي.\n\n' +
                'هذا الإجراء لا يمكن التراجع عنه!'
            );
            if (!confirmed) return;

            const doubleConfirm = confirm('تأكيد أخير: هل تريد حذف الحساب نهائياً؟');
            if (!doubleConfirm) return;

            try {
                const { data: { user } } = await sb.auth.getUser();
                if (!user) return;

                // 1. حذف بيانات المستخدم من user_configs
                const { error: deleteDataError } = await sb
                    .from('user_configs')
                    .delete()
                    .eq('user_id', user.id);
                
                if (deleteDataError) throw deleteDataError;

                // 2. تسجيل الخروج
                // ملاحظة: حذف حساب المصادقة نفسه يتطلب صلاحيات أدمن أو استخدام API خارجي
                // هنا نقوم بحذف البيانات المرتبطة وتسجيل الخروج فقط.
                await sb.auth.signOut();
                clearLocalData();
                
                showToast('تم حذف الحساب وجميع البيانات ✅', 'success');
                renderAll();
            } catch (e) {
                console.error('Delete account error:', e);
                showToast('فشل حذف الحساب: ' + e.message, 'danger');
            }
        }

        // ===== FIX 6: GAS Sync Progress UI =====
        async function openSyncModal() {
            if (!state.gasConfig.url) {
                return showToast('يرجى ضبط رابط GAS أولاً في الإعدادات', 'warning');
            }

            const totalEvents = state.reminders.reduce((acc, rem) => {
                return acc + generateStages(rem.date, rem.type).length;
            }, 0) + state.habits.reduce((acc, h) => acc + h.times.length * 7, 0);

            showModal(`
                <div class="modal-header">
                    <div class="modal-title">📅 مزامنة تقويم Google</div>
                    <button class="btn btn-icon" onclick="closeModal()">✕</button>
                </div>
                <div style="background:rgba(79,70,229,0.1);border:1px solid rgba(79,70,229,0.3);
                            border-radius:8px;padding:12px;margin-bottom:16px;font-size:0.82rem;
                            color:var(--text2);line-height:1.7;">
                    📌 سيتم إرسال <strong style="color:var(--text)">${totalEvents} حدث</strong> 
                    تقريباً إلى تقويم Google عبر GAS.<br>
                    ⚠️ بسبب قيود المتصفح، لا يمكن التحقق من النجاح مباشرة — 
                    تحقق من تقويمك بعد الإرسال.
                </div>
                <div id="sync-progress-container" style="display:none;margin-bottom:16px;">
                    <div style="display:flex;justify-content:space-between;
                                font-size:0.8rem;color:var(--text2);margin-bottom:6px;">
                        <span>جاري الإرسال...</span>
                        <span id="sync-progress-text">0 / ${totalEvents}</span>
                    </div>
                    <div style="height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;">
                        <div id="sync-progress-bar" 
                             style="height:100%;background:var(--primary);width:0%;transition:width 0.2s;">
                        </div>
                    </div>
                </div>
                <div style="display:flex;gap:10px;">
                    <button id="sync-modal-btn" class="btn btn-primary" 
                            style="flex:1" onclick="syncToGoogleCalendar()">
                        🚀 ابدأ المزامنة (${totalEvents} حدث)
                    </button>
                    <button class="btn btn-secondary" style="flex:1" 
                            onclick="exportICS()">
                        📥 تصدير ICS بدلاً
                    </button>
                </div>
            `);
        }

        async function syncToGoogleCalendar() {
            if (!state.gasConfig.url) {
                showToast('يرجى حفظ رابط GAS أولاً', 'warning');
                return;
            }

            const btn = document.querySelector('#sync-modal-btn');
            if (btn) { btn.disabled = true; btn.innerText = 'جاري الإرسال...'; }

            const now = new Date();
            let events = [];

            // جمع أحداث التذكيرات
            state.reminders.forEach(rem => {
                const stages = generateStages(rem.date, rem.type);
                stages.forEach((s, idx) => {
                    const stageDate = new Date(s.date);
                    if (stageDate >= now && (!rem.doneStages || !rem.doneStages.includes(idx))) {
                        events.push({
                            title: `${rem.name} - ${s.label}`,
                            startTime: s.date + 'T09:00:00',
                            durationMinutes: 30,
                            description: 'تذكير من تطبيق مذاكرتي',
                            reminderMinutes: 30,
                            secret: state.gasConfig.secret
                        });
                    }
                });
            });

            // جمع أحداث العادات (7 أيام قادمة)
            state.habits.forEach(h => {
                h.times.forEach(t => {
                    const [hh, mm] = t.split(':').map(Number);
                    for (let i = 0; i < 7; i++) {
                        const d = new Date();
                        d.setDate(d.getDate() + i);
                        d.setHours(hh, mm, 0, 0);
                        events.push({
                            title: `🦷 ${h.name}`,
                            startTime: d.toISOString().slice(0, 19),
                            durationMinutes: 15,
                            description: 'عادة يومية - مذاكرتي',
                            reminderMinutes: 10,
                            secret: state.gasConfig.secret
                        });
                    }
                });
            });

            if (events.length === 0) {
                showToast('لا توجد أحداث للمزامنة', 'warning');
                if (btn) btn.disabled = false;
                return;
            }

            // Update modal to show progress
            const progressContainer = document.getElementById('sync-progress-container');
            if (progressContainer) progressContainer.style.display = 'block';

            let successCount = 0;
            let failedCount = 0;

            // إرسال الأحداث بشكل تسلسلي مع تأخير لتجنب rate limit
            for (let i = 0; i < events.length; i++) {
                const ev = events[i];
                
                // Update progress
                const progressEl = document.getElementById('sync-progress-text');
                if (progressEl) progressEl.innerText = `${i + 1} / ${events.length}`;
                const progressBar = document.getElementById('sync-progress-bar');
                if (progressBar) progressBar.style.width = `${((i+1)/events.length)*100}%`;

                try {
                    // استخدام no-cors لأن GAS لا يدعم CORS headers
                    await fetch(state.gasConfig.url, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(ev)
                    });
                    // مع no-cors لا يمكن قراءة الـ response لكن الطلب يصل لـ GAS
                    successCount++;
                } catch (err) {
                    console.error('Failed to send event:', ev.title, err);
                    failedCount++;
                }

                // تأخير 200ms بين الطلبات
                if (i < events.length - 1) {
                    await new Promise(resolve => setTimeout(resolve, 200));
                }
            }

            if (btn) { btn.disabled = false; btn.innerText = 'إرسال مرة أخرى 🔄'; }
            
            showToast(
                `تم الإرسال لـ GAS ✅ (${successCount} حدث) — تحقق من تقويمك`,
                'success'
            );
        }

        // ===== تصدير ICS =====
        function exportICS() {
            let ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//MyStudyApp//NONSGML v1.0//EN\nCALSCALE:GREGORIAN\nMETHOD:PUBLISH\n";
            state.reminders.forEach(rem => {
                const stages = generateStages(rem.date, rem.type);
                stages.forEach(s => {
                    const d = s.date.replace(/-/g, '');
                    ics += `BEGIN:VEVENT\nDTSTART;VALUE=DATE:${d}\nDTEND;VALUE=DATE:${d}\nSUMMARY:${rem.name} - ${s.label}\nDESCRIPTION:تذكير من تطبيق مذاكرتي\nEND:VEVENT\n`;
                });
            });
            state.habits.forEach(h => {
                h.times.forEach(t => {
                    const time = t.replace(':', '') + '00';
                    ics += `BEGIN:VEVENT\nDTSTART:20240101T${time}\nRRULE:FREQ=DAILY\nSUMMARY:عادة: ${h.name}\nEND:VEVENT\n`;
                });
            });
            ics += "END:VCALENDAR";
            const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.setAttribute('download', 'مذاكرتي.ics');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // ===== الإشعارات =====
        function requestNotificationPermission() {
            setTimeout(() => {
                if ("Notification" in window && Notification.permission === "default") Notification.requestPermission();
            }, 2000);
        }

        function startNotificationCheck() {
            setInterval(() => {
                const now = new Date();
                const hhmm = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                const today = now.toISOString().split('T')[0];
                state.habits.forEach(h => {
                    if (h.times.includes(hhmm)) {
                        const logs = state.habitLogs[today] || {};
                        const habitLogs = logs[h.id] || [];
                        const timeIdx = h.times.indexOf(hhmm);
                        if (!habitLogs.includes(timeIdx)) {
                            if (Notification.permission === "granted") {
                                new Notification("مذاكرتي - تذكير عادة", { body: `حان وقت: ${h.name}`, icon: "https://cdn-icons-png.flaticon.com/512/3271/3271314.png" });
                            }
                        }
                    }
                });
            }, 60000);
        }

        // ===== وظائف مساعدة =====
        function showModal(html) { document.getElementById('modal-content').innerHTML = html; document.getElementById('modal-overlay').style.display = 'flex'; }
        
        // ===== FIX: Bug 3 =====
        function closeModalIfOverlay(event) {
            if (event.target === document.getElementById('modal-overlay')) closeModal();
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        init();
    </script>
</body>
</html>
