<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>مذاكرتي - MyStudyApp</title>
    <meta name="theme-color" content="#0f172a" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style type="text/tailwindcss">
        @theme {
            --font-sans: "Cairo", ui-sans-serif, system-ui, sans-serif;
            --color-primary: #4f46e5;
            --color-primary-light: #818cf8;
            --color-primary-dark: #3730a3;
            --color-secondary: #06b6d4;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
            --color-bg-main: #0f172a;
            --color-bg-card: #1e293b;
            --color-bg-hover: #334155;
            --color-text-main: #f1f5f9;
            --color-text-muted: #94a3b8;
            --color-text-dim: #64748b;
        }
        @layer base {
            body {
                @apply bg-bg-main text-text-main font-sans;
                direction: rtl;
            }
        }
        .card { @apply bg-bg-card rounded-[14px] p-4 border border-white/5 shadow-xl; }
        .btn-primary { @apply bg-primary hover:bg-primary-light text-white font-bold py-3 px-6 rounded-[14px] transition-all active:scale-95 flex items-center justify-center gap-2 disabled:opacity-50; }
        .btn-secondary { @apply bg-bg-hover hover:bg-bg-hover/80 text-text-main font-semibold py-2 px-4 rounded-[14px] transition-all; }
        .nav-item { @apply flex flex-col items-center justify-center gap-1 text-text-dim transition-colors py-2; }
        .nav-item.active { @apply text-primary; }
        .input-field { @apply w-full bg-bg-main border border-white/10 rounded-[10px] p-3 text-text-main focus:border-primary outline-none transition-all; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { @apply bg-bg-main; }
        ::-webkit-scrollbar-thumb { @apply bg-bg-hover rounded-full; }
    </style>
</head>
<body class="bg-bg-main text-text-main overflow-x-hidden pb-24">
    <div id="root"></div>

    <script>
        // ==========================================
        // تهيئة Supabase
        // ==========================================
        const SUPABASE_URL = 'https://llumspntrtdgwmodpmyc.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_FXUJGp0pX57KCkdMyQWj5A_xEbKkIfD';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==========================================
        // الثوابت والأنواع
        // ==========================================
        const STORAGE_PREFIX = 'mthakrti_';
        const COLORS = ['#4f46e5', '#06b6d4', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#8b5cf6', '#f97316', '#14b8a6', '#6366f1'];

        // ==========================================
        // إدارة الحالة
        // ==========================================
        class State {
            constructor() {
                this.loadLocal();
                this.user = null;
                this.cloudConfig = null;
                if (this.habits.length === 0) this.seedInitialData();
            }

            loadLocal() {
                this.subjects = JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'subjects') || '[]');
                this.reminders = JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'reminders') || '[]');
                this.habits = JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'habits') || '[]');
                this.habitLogs = JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'habitLogs') || '{}');
                this.gasUrl = localStorage.getItem(STORAGE_PREFIX + 'gasUrl') || '';
                this.gasSecret = localStorage.getItem(STORAGE_PREFIX + 'gasSecret') || '';
            }

            seedInitialData() {
                this.habits = [{
                    id: crypto.randomUUID(),
                    name: '🦷 تفريش الأسنان',
                    times: ['07:30', '22:00'],
                    createdAt: Date.now(),
                    streak: 0
                }];
                this.save();
            }

            save() {
                localStorage.setItem(STORAGE_PREFIX + 'subjects', JSON.stringify(this.subjects));
                localStorage.setItem(STORAGE_PREFIX + 'reminders', JSON.stringify(this.reminders));
                localStorage.setItem(STORAGE_PREFIX + 'habits', JSON.stringify(this.habits));
                localStorage.setItem(STORAGE_PREFIX + 'habitLogs', JSON.stringify(this.habitLogs));
                localStorage.setItem(STORAGE_PREFIX + 'gasUrl', this.gasUrl);
                localStorage.setItem(STORAGE_PREFIX + 'gasSecret', this.gasSecret);
            }

            getPackage() {
                return {
                    subjects: this.subjects,
                    reminders: this.reminders,
                    habits: this.habits,
                    habitLogs: this.habitLogs
                };
            }

            applyPackage(data) {
                if (!data) return;
                this.subjects = data.subjects || [];
                this.reminders = data.reminders || [];
                this.habits = data.habits || [];
                this.habitLogs = data.habitLogs || {};
                this.save();
            }
        }

        const state = new State();

        // ==========================================
        // منطق السحابة (Supabase)
        // ==========================================
        async function syncToCloud() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return openAuthModal();

            showToast('جاري المزامنة...', 'info');
            try {
                const { error } = await supabaseClient
                    .from('user_configs')
                    .upsert({
                        user_id: user.id,
                        script_url: state.gasUrl,
                        study_data: state.getPackage()
                    }, { onConflict: 'user_id' });

                if (error) throw error;
                showToast('تمت المزامنة بنجاح ✅', 'success');
            } catch (err) {
                console.error(err);
                showToast('فشلت المزامنة ❌', 'danger');
            }
        }

        async function loadFromCloud() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return;

            try {
                const { data, error } = await supabaseClient
                    .from('user_configs')
                    .select('*')
                    .eq('user_id', user.id)
                    .single();

                if (error && error.code !== 'PGRST116') throw error;
                if (data) {
                    state.cloudConfig = data;
                    state.gasUrl = data.script_url || state.gasUrl;
                    state.applyPackage(data.study_data);
                    renderApp();
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function saveScriptUrl() {
            const url = document.getElementById('settings-gas-url').value;
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return openAuthModal();

            try {
                const { error } = await supabaseClient
                    .from('user_configs')
                    .upsert({
                        user_id: user.id,
                        script_url: url,
                        study_data: state.getPackage()
                    }, { onConflict: 'user_id' });

                if (error) throw error;
                state.gasUrl = url;
                state.save();
                showToast('تم حفظ الرابط بنجاح', 'success');
            } catch (err) {
                showToast('فشل الحفظ', 'danger');
            }
        }

        // ==========================================
        // واجهة المستخدم الرئيسية
        // ==========================================
        function renderApp() {
            const root = document.getElementById('root');
            if (!root) return;

            root.innerHTML = `
                <div class="min-h-screen flex flex-col">
                    <!-- Header -->
                    <header class="p-4 flex justify-between items-center bg-bg-card border-b border-white/5">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center font-bold">م</div>
                            <span class="font-bold">مذاكرتي</span>
                        </div>
                        <div id="auth-status" class="flex items-center gap-3">
                            <!-- Auth status injected here -->
                        </div>
                    </header>

                    <!-- Main Content -->
                    <main id="content" class="flex-1 p-4 max-w-2xl mx-auto w-full">
                        <!-- Sections injected here -->
                    </main>

                    <!-- Bottom Navigation -->
                    <nav class="fixed bottom-0 left-0 right-0 bg-bg-card border-t border-white/5 px-6 pb-safe flex justify-between items-center z-50">
                        <button onclick="navigateTo('home')" class="nav-item" id="nav-home">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                            <span class="text-[10px]">الرئيسية</span>
                        </button>
                        <button onclick="navigateTo('subjects')" class="nav-item" id="nav-subjects">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
                            <span class="text-[10px]">المواد</span>
                        </button>
                        <button onclick="navigateTo('reminders')" class="nav-item" id="nav-reminders">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
                            <span class="text-[10px]">التذكيرات</span>
                        </button>
                        <button onclick="navigateTo('habits')" class="nav-item" id="nav-habits">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                            <span class="text-[10px]">عادات</span>
                        </button>
                    </nav>

                    <!-- Modals Container -->
                    <div id="modal-container" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                        <div id="modal-content" class="bg-bg-card w-full max-w-md rounded-[20px] p-6 shadow-2xl border border-white/10 max-h-[90vh] overflow-y-auto"></div>
                    </div>

                    <!-- Toasts Container -->
                    <div id="toast-container" class="fixed top-4 left-4 right-4 z-[200] flex flex-col gap-2 pointer-events-none"></div>
                </div>
            `;
            updateAuthUI();
            navigateTo('home');
        }

        async function updateAuthUI() {
            const authStatus = document.getElementById('auth-status');
            if (!authStatus) return;

            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                authStatus.innerHTML = `
                    <div class="text-right hidden sm:block">
                        <div class="text-[10px] text-text-muted">مسجل كـ</div>
                        <div class="text-xs font-medium">${user.email}</div>
                    </div>
                    <button onclick="handleLogout()" class="w-8 h-8 rounded-full bg-bg-hover flex items-center justify-center text-danger">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
                    </button>
                `;
            } else {
                authStatus.innerHTML = `
                    <button onclick="openAuthModal()" class="btn-secondary text-xs px-4 py-1.5">تسجيل الدخول</button>
                `;
            }
        }

        // ==========================================
        // منطق التنقل
        // ==========================================
        function navigateTo(page) {
            const content = document.getElementById('content');
            if (!content) return;

            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById(`nav-${page}`)?.classList.add('active');

            switch(page) {
                case 'home': renderHome(content); break;
                case 'subjects': renderSubjects(content); break;
                case 'reminders': renderReminders(content); break;
                case 'habits': renderHabits(content); break;
            }
        }

        // ==========================================
        // قسم الرئيسية
        // ==========================================
        function renderHome(container) {
            const totalChapters = state.subjects.reduce((acc, s) => acc + s.chapters.length, 0);
            const doneChapters = state.subjects.reduce((acc, s) => acc + s.chapters.filter(c => c.done).length, 0);
            const progress = totalChapters > 0 ? Math.round((doneChapters / totalChapters) * 100) : 0;

            container.innerHTML = `
                <header class="mb-8">
                    <h1 class="text-3xl font-bold mb-2">أهلاً بك 👋</h1>
                    <p class="text-text-muted">إليك ملخص يومك الدراسي</p>
                </header>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="card bg-gradient-to-br from-primary/20 to-transparent">
                        <span class="text-text-dim text-sm block mb-1">إنجاز المواد</span>
                        <div class="text-2xl font-bold">${progress}%</div>
                        <div class="w-full bg-white/10 h-1.5 rounded-full mt-2">
                            <div class="bg-primary h-full rounded-full transition-all duration-500" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    <div class="card bg-gradient-to-br from-secondary/20 to-transparent">
                        <span class="text-text-dim text-sm block mb-1">تذكيرات قادمة</span>
                        <div class="text-2xl font-bold">${state.reminders.length}</div>
                        <span class="text-xs text-text-muted">مهام نشطة</span>
                    </div>
                </div>

                <!-- Cloud Sync Section -->
                <section class="mb-8">
                    <div class="card border-primary/20 bg-primary/5">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19a3.5 3.5 0 0 0 0-7h-1.5a7 7 0 1 0-11.76 6.91"/></svg>
                                المزامنة السحابية
                            </h3>
                            <button onclick="syncToCloud()" class="text-primary text-xs font-bold">مزامنة الآن</button>
                        </div>
                        <p class="text-[10px] text-text-muted mb-4">احفظ بياناتك وإعداداتك في السحابة للوصول إليها من أي مكان.</p>
                        <div class="space-y-3">
                            <div>
                                <label class="text-[10px] text-text-dim block mb-1">رابط Google Apps Script</label>
                                <div class="flex gap-2">
                                    <input type="text" id="settings-gas-url" class="input-field text-xs py-2" value="${state.gasUrl}" placeholder="https://script.google.com/macros/s/...">
                                    <button onclick="saveScriptUrl()" class="btn-primary text-xs px-4 py-2">حفظ</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <div class="flex gap-3">
                    <button onclick="exportICS()" class="btn-secondary flex-1 flex items-center justify-center gap-2 text-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                        تصدير التقويم
                    </button>
                    <button onclick="openSyncModal()" class="btn-secondary flex-1 flex items-center justify-center gap-2 text-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
                        مزامنة جوجل
                    </button>
                </div>
            `;
        }

        // ==========================================
        // أقسام المواد والتذكيرات والعادات (نفس المنطق السابق)
        // ==========================================
        function renderSubjects(container) {
            container.innerHTML = `
                <header class="flex justify-between items-center mb-6">
                    <h1 class="text-2xl font-bold">المواد الدراسية</h1>
                    <button onclick="openAddSubjectModal()" class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-white shadow-lg shadow-primary/20">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                </header>
                <div class="space-y-4">
                    ${state.subjects.length > 0 ? state.subjects.map(s => {
                        const done = s.chapters.filter(c => c.done).length;
                        const total = s.chapters.length;
                        const progress = total > 0 ? Math.round((done / total) * 100) : 0;
                        return `
                            <div class="card border-r-4" style="border-right-color: ${s.color}">
                                <div class="flex justify-between items-start mb-2">
                                    <h3 class="font-bold text-lg">${s.name}</h3>
                                    <div class="flex gap-2">
                                        <button onclick="addChapter('${s.id}')" class="text-primary p-1"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></button>
                                        <button onclick="deleteSubject('${s.id}')" class="text-danger p-1"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>
                                    </div>
                                </div>
                                <div class="flex justify-between text-xs text-text-muted mb-2">
                                    <span>${done} من ${total} فصول</span>
                                    <span>${progress}%</span>
                                </div>
                                <div class="w-full bg-white/5 h-1.5 rounded-full mb-4">
                                    <div class="h-full rounded-full transition-all duration-500" style="width: ${progress}%; background-color: ${s.color}"></div>
                                </div>
                                <div class="space-y-2">
                                    ${s.chapters.map(c => `
                                        <div class="flex items-center gap-3 py-1">
                                            <button onclick="toggleChapter('${s.id}', '${c.id}')" class="w-5 h-5 rounded border border-white/20 flex items-center justify-center transition-all ${c.done ? 'bg-success border-success' : ''}">
                                                ${c.done ? '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="text-white"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
                                            </button>
                                            <span class="text-sm ${c.done ? 'text-text-dim line-through' : ''}">${c.name}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    }).join('') : '<div class="text-center py-12 text-text-dim">ابدأ بإضافة أول مادة دراسية</div>'}
                </div>
            `;
        }

        function renderReminders(container) {
            container.innerHTML = `
                <header class="flex justify-between items-center mb-6">
                    <h1 class="text-2xl font-bold">التذكيرات الذكية</h1>
                    <button onclick="openAddReminderModal()" class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-white shadow-lg shadow-primary/20">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                </header>
                <div class="space-y-6">
                    ${state.reminders.length > 0 ? state.reminders.map(r => `
                        <div class="card relative overflow-hidden">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="px-2 py-0.5 rounded-full text-[10px] uppercase font-bold bg-white/10 text-text-muted">
                                            ${r.type === 'exam' ? 'امتحان' : r.type === 'quiz' ? 'كويز' : r.type === 'assignment' ? 'واجب' : 'آخر'}
                                        </span>
                                        <h3 class="font-bold text-lg">${r.name}</h3>
                                    </div>
                                    <p class="text-xs text-text-dim">${new Date(r.date).toLocaleDateString('ar-EG', { dateStyle: 'full' })}</p>
                                </div>
                                <button onclick="deleteReminder('${r.id}')" class="text-danger/50 hover:text-danger p-1"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>
                            </div>
                            <div class="relative pt-4 pb-2">
                                <div class="absolute top-8 left-4 right-4 h-0.5 bg-white/5"></div>
                                <div class="flex justify-between relative px-2">
                                    ${r.stages.map(s => `
                                        <div class="flex flex-col items-center gap-2 z-10">
                                            <button onclick="toggleReminderStage('${r.id}', '${s.label}')" class="w-8 h-8 rounded-full border-2 flex items-center justify-center transition-all ${s.done ? 'bg-success border-success' : 'bg-bg-card border-white/10'}" style="${!s.done ? `border-color: ${s.color}44` : ''}">
                                                ${s.done ? '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="text-white"><polyline points="20 6 9 17 4 12"/></svg>' : `<div class="w-2 h-2 rounded-full" style="background-color: ${s.color}"></div>`}
                                            </button>
                                            <div class="text-[10px] text-center">
                                                <div class="font-bold ${s.done ? 'text-text-dim' : ''}">${s.label}</div>
                                                <div class="text-text-dim">${new Date(s.date).toLocaleDateString('ar-EG', { day: 'numeric', month: 'short' })}</div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `).join('') : '<div class="text-center py-12 text-text-dim">لا توجد تذكيرات حالية</div>'}
                </div>
            `;
        }

        function renderHabits(container) {
            const today = new Date().toISOString().split('T')[0];
            const totalChecks = state.habits.reduce((acc, h) => acc + h.times.length, 0);
            const doneChecks = state.habits.reduce((acc, h) => acc + (state.habitLogs[today]?.[h.id]?.length || 0), 0);
            const progress = totalChecks > 0 ? Math.round((doneChecks / totalChecks) * 100) : 0;

            container.innerHTML = `
                <header class="flex justify-between items-center mb-6">
                    <h1 class="text-2xl font-bold">عادات يومية</h1>
                    <button onclick="openAddHabitModal()" class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-white shadow-lg shadow-primary/20">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                </header>
                <div class="card bg-gradient-to-r from-success/20 to-transparent mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <h2 class="font-bold">إنجاز اليوم</h2>
                        <span class="text-success font-bold">${progress}%</span>
                    </div>
                    <div class="w-full bg-white/5 h-2 rounded-full">
                        <div class="bg-success h-full rounded-full transition-all duration-700" style="width: ${progress}%"></div>
                    </div>
                </div>
                <div class="space-y-4">
                    ${state.habits.map(h => {
                        const checks = state.habitLogs[today]?.[h.id] || [];
                        return `
                            <div class="card">
                                <div class="flex justify-between items-center mb-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-xl">${h.name.split(' ')[0]}</div>
                                        <div>
                                            <h3 class="font-bold">${h.name.split(' ').slice(1).join(' ') || h.name}</h3>
                                            <p class="text-xs text-text-dim">سلسلة: ${h.streak} أيام</p>
                                        </div>
                                    </div>
                                    <button onclick="deleteHabit('${h.id}')" class="text-danger/40 hover:text-danger"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>
                                </div>
                                <div class="flex gap-2 overflow-x-auto pb-2">
                                    ${h.times.map((time, idx) => {
                                        const isDone = checks.includes(idx);
                                        return `
                                            <button onclick="toggleHabitCheck('${h.id}', ${idx})" class="flex-shrink-0 px-4 py-2 rounded-xl border transition-all flex flex-col items-center gap-1 ${isDone ? 'bg-success border-success text-white' : 'bg-white/5 border-white/5 text-text-muted'}">
                                                <span class="text-xs font-bold">${time}</span>
                                                ${isDone ? '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>'}
                                            </button>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        // ==========================================
        // منطق المصادقة (Supabase Auth)
        // ==========================================
        function openAuthModal(mode = 'login') {
            openModal(`
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-bold mb-2">${mode === 'login' ? 'تسجيل الدخول' : 'إنشاء حساب جديد'}</h2>
                    <p class="text-text-muted text-sm">قم بمزامنة بياناتك عبر السحابة</p>
                </div>
                <form onsubmit="handleAuth(event, '${mode}')" class="space-y-4">
                    <div>
                        <label class="text-xs text-text-dim block mb-1">البريد الإلكتروني</label>
                        <input type="email" id="auth-email" class="input-field" required placeholder="example@mail.com">
                    </div>
                    <div>
                        <label class="text-xs text-text-dim block mb-1">كلمة المرور</label>
                        <input type="password" id="auth-password" class="input-field" required placeholder="••••••••">
                    </div>
                    <button type="submit" id="auth-submit-btn" class="btn-primary w-full">
                        ${mode === 'login' ? 'دخول' : 'تسجيل'}
                    </button>
                    <div class="text-center mt-4">
                        <button type="button" onclick="openAuthModal('${mode === 'login' ? 'signup' : 'login'}')" class="text-primary text-xs font-bold underline">
                            ${mode === 'login' ? 'ليس لديك حساب؟ سجل الآن' : 'لديك حساب بالفعل؟ ادخل'}
                        </button>
                    </div>
                </form>
            `);
        }

        async function handleAuth(e, mode) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const btn = document.getElementById('auth-submit-btn');

            btn.disabled = true;
            btn.innerText = 'جاري العمل...';

            try {
                let result;
                if (mode === 'login') {
                    result = await supabaseClient.auth.signInWithPassword({ email, password });
                } else {
                    result = await supabaseClient.auth.signUp({ email, password });
                }

                if (result.error) throw result.error;

                showToast(mode === 'login' ? 'تم الدخول بنجاح' : 'تم إنشاء الحساب بنجاح', 'success');
                closeModal();
                await loadFromCloud();
                updateAuthUI();
            } catch (err) {
                showToast(err.message, 'danger');
            } finally {
                btn.disabled = false;
                btn.innerText = mode === 'login' ? 'دخول' : 'تسجيل';
            }
        }

        async function handleLogout() {
            if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
                await supabaseClient.auth.signOut();
                showToast('تم تسجيل الخروج', 'info');
                updateAuthUI();
                renderApp();
            }
        }

        // ==========================================
        // منطق النوافذ المنبثقة والتوست
        // ==========================================
        function openModal(html) {
            const modal = document.getElementById('modal-container');
            const content = document.getElementById('modal-content');
            if (!modal || !content) return;
            content.innerHTML = html;
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-container')?.classList.add('hidden');
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = `p-3 rounded-lg text-white text-xs font-bold shadow-lg transition-all transform translate-y-4 opacity-0 flex items-center gap-2 pointer-events-auto`;
            
            const colors = {
                success: 'bg-success',
                danger: 'bg-danger',
                warning: 'bg-warning',
                info: 'bg-primary'
            };
            toast.classList.add(colors[type] || colors.info);
            
            toast.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12" y1="8" y2="8"/></svg>
                ${message}
            `;

            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('translate-y-4', 'opacity-0');
            }, 10);

            setTimeout(() => {
                toast.classList.add('translate-y-4', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ==========================================
        // مزامنة Google Calendar عبر GAS
        // ==========================================
        async function openSyncModal() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return openAuthModal();

            openModal(`
                <h2 class="text-xl font-bold mb-4">مزامنة تقويم جوجل</h2>
                <div class="space-y-4">
                    <p class="text-xs text-text-muted">سيتم إرسال مهامك وعاداتك إلى تقويم جوجل الخاص بك.</p>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 text-sm">
                            <input type="checkbox" id="sync-reminders" checked> تذكيرات
                        </label>
                        <label class="flex items-center gap-2 text-sm">
                            <input type="checkbox" id="sync-habits" checked> عادات
                        </label>
                    </div>
                    <div id="sync-status" class="hidden">
                        <div class="w-full bg-white/5 h-1 rounded-full mb-2">
                            <div id="sync-progress" class="bg-primary h-full rounded-full transition-all" style="width: 0%"></div>
                        </div>
                        <div id="sync-log" class="text-[10px] text-text-dim h-20 overflow-y-auto bg-black/20 p-2 rounded"></div>
                    </div>
                    <button onclick="startSync()" id="sync-btn" class="btn-primary w-full mt-4">بدء المزامنة</button>
                </div>
            `);
        }

        async function startSync() {
            const syncRem = document.getElementById('sync-reminders').checked;
            const syncHab = document.getElementById('sync-habits').checked;

            if (!state.gasUrl) return showToast('يرجى حفظ رابط GAS أولاً في الإعدادات', 'warning');

            const btn = document.getElementById('sync-btn');
            const status = document.getElementById('sync-status');
            const progress = document.getElementById('sync-progress');
            const log = document.getElementById('sync-log');

            btn.disabled = true;
            btn.innerText = 'جاري المزامنة...';
            status.classList.remove('hidden');
            log.innerHTML = '';

            const tasks = [];
            if (syncRem) {
                state.reminders.forEach(r => {
                    r.stages.forEach(s => {
                        if (!s.done) {
                            tasks.push({
                                title: `${r.name} - ${s.label}`,
                                startTime: new Date(s.date).toISOString(),
                                durationMinutes: 30,
                                description: 'مذاكرتي - تذكير ذكي',
                                reminderMinutes: 30
                            });
                        }
                    });
                });
            }
            if (syncHab) {
                state.habits.forEach(h => {
                    h.times.forEach(t => {
                        const [hh, mm] = t.split(':');
                        const d = new Date();
                        d.setHours(parseInt(hh), parseInt(mm), 0);
                        for (let i = 0; i < 7; i++) {
                            const sd = new Date(d);
                            sd.setDate(sd.getDate() + i);
                            tasks.push({
                                title: h.name,
                                startTime: sd.toISOString(),
                                durationMinutes: 15,
                                description: 'مذاكرتي - عادة يومية',
                                reminderMinutes: 10
                            });
                        }
                    });
                });
            }

            if (tasks.length === 0) {
                btn.innerText = 'لا يوجد مهام للمزامنة';
                btn.disabled = false;
                return;
            }

            for (let i = 0; i < tasks.length; i++) {
                try {
                    await fetch(state.gasUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(tasks[i])
                    });
                    log.innerHTML += `<div>✅ تم إرسال: ${tasks[i].title}</div>`;
                } catch (e) {
                    log.innerHTML += `<div class="text-danger">❌ خطأ في: ${tasks[i].title}</div>`;
                }
                progress.style.width = `${((i + 1) / tasks.length) * 100}%`;
                log.scrollTop = log.scrollHeight;
            }

            btn.innerText = 'تمت المزامنة بنجاح!';
            setTimeout(() => closeModal(), 2000);
        }

        // ==========================================
        // وظائف مساعدة (المواد، التذكيرات، العادات)
        // ==========================================
        function openAddSubjectModal() {
            openModal(`
                <h2 class="text-xl font-bold mb-4">إضافة مادة جديدة</h2>
                <div class="space-y-4">
                    <input type="text" id="subj-name" class="input-field" placeholder="اسم المادة">
                    <div class="flex flex-wrap gap-2">
                        ${COLORS.map(c => `<button onclick="selectColor(this, '${c}')" class="w-8 h-8 rounded-full border-2 border-transparent transition-all" style="background-color: ${c}"></button>`).join('')}
                    </div>
                    <input type="hidden" id="subj-color" value="${COLORS[0]}">
                    <button onclick="saveSubject()" class="btn-primary w-full mt-4">حفظ المادة</button>
                </div>
            `);
        }

        function selectColor(el, color) {
            document.querySelectorAll('[onclick*="selectColor"]').forEach(b => b.classList.remove('border-white', 'scale-110'));
            el.classList.add('border-white', 'scale-110');
            document.getElementById('subj-color').value = color;
        }

        function saveSubject() {
            const name = document.getElementById('subj-name').value;
            const color = document.getElementById('subj-color').value;
            if (!name) return;
            state.subjects.push({ id: crypto.randomUUID(), name, color, chapters: [] });
            state.save();
            closeModal();
            navigateTo('subjects');
        }

        function addChapter(subjId) {
            const name = prompt('اسم الفصل:');
            if (!name) return;
            const subj = state.subjects.find(s => s.id === subjId);
            if (subj) {
                subj.chapters.push({ id: crypto.randomUUID(), name, done: false });
                state.save();
                navigateTo('subjects');
            }
        }

        function toggleChapter(subjId, chapId) {
            const subj = state.subjects.find(s => s.id === subjId);
            if (subj) {
                const chap = subj.chapters.find(c => c.id === chapId);
                if (chap) {
                    chap.done = !chap.done;
                    state.save();
                    navigateTo('subjects');
                }
            }
        }

        function deleteSubject(id) {
            if (confirm('حذف المادة؟')) {
                state.subjects = state.subjects.filter(s => s.id !== id);
                state.save();
                navigateTo('subjects');
            }
        }

        function openAddReminderModal() {
            openModal(`
                <h2 class="text-xl font-bold mb-4">إضافة تذكير ذكي</h2>
                <div class="space-y-4">
                    <input type="text" id="rem-name" class="input-field" placeholder="اسم المهمة">
                    <select id="rem-type" class="input-field">
                        <option value="exam">امتحان (4 مراحل)</option>
                        <option value="quiz">كويز (مرحلتان)</option>
                        <option value="assignment">واجب (3 مراحل)</option>
                        <option value="other">آخر (مرحلة واحدة)</option>
                    </select>
                    <input type="date" id="rem-date" class="input-field">
                    <button onclick="saveReminder()" class="btn-primary w-full mt-4">إنشاء التذكير</button>
                </div>
            `);
        }

        function saveReminder() {
            const name = document.getElementById('rem-name').value;
            const type = document.getElementById('rem-type').value;
            const dateStr = document.getElementById('rem-date').value;
            if (!name || !dateStr) return;

            const baseDate = new Date(dateStr);
            const stages = [];
            const addStage = (label, daysBefore, color) => {
                const d = new Date(baseDate);
                d.setDate(d.getDate() - daysBefore);
                stages.push({ label, daysBefore, color, date: d.toISOString().split('T')[0], done: false });
            };

            if (type === 'exam') {
                addStage('تخطيط', 14, '#8b5cf6'); addStage('مراجعة 1', 7, '#06b6d4'); addStage('مراجعة 2', 3, '#f59e0b'); addStage('ليلة الامتحان', 1, '#ef4444');
            } else if (type === 'quiz') {
                addStage('دراسة', 3, '#06b6d4'); addStage('مراجعة', 1, '#ef4444');
            } else if (type === 'assignment') {
                addStage('بدء', 7, '#8b5cf6'); addStage('تكملة', 3, '#f59e0b'); addStage('تسليم', 1, '#10b981');
            } else {
                addStage('تذكير', 2, '#4f46e5');
            }

            state.reminders.push({ id: crypto.randomUUID(), name, type, date: dateStr, stages });
            state.save();
            closeModal();
            navigateTo('reminders');
        }

        function toggleReminderStage(remId, stageLabel) {
            const rem = state.reminders.find(r => r.id === remId);
            if (rem) {
                const stage = rem.stages.find(s => s.label === stageLabel);
                if (stage) {
                    stage.done = !stage.done;
                    state.save();
                    navigateTo('reminders');
                }
            }
        }

        function deleteReminder(id) {
            if (confirm('حذف التذكير؟')) {
                state.reminders = state.reminders.filter(r => r.id !== id);
                state.save();
                navigateTo('reminders');
            }
        }

        function openAddHabitModal() {
            openModal(`
                <h2 class="text-xl font-bold mb-4">إضافة عادة جديدة</h2>
                <div class="space-y-4">
                    <input type="text" id="habit-name" class="input-field" placeholder="💧 شرب الماء">
                    <div id="habit-times-container" class="space-y-2">
                        <input type="time" class="habit-time-input input-field">
                    </div>
                    <button onclick="addTimeInput()" class="text-primary text-xs font-bold">+ إضافة وقت آخر</button>
                    <button onclick="saveHabit()" class="btn-primary w-full mt-4">حفظ العادة</button>
                </div>
            `);
        }

        function addTimeInput() {
            const container = document.getElementById('habit-times-container');
            const input = document.createElement('input');
            input.type = 'time';
            input.className = 'habit-time-input input-field mt-2';
            container.appendChild(input);
        }

        function saveHabit() {
            const name = document.getElementById('habit-name').value;
            const times = Array.from(document.querySelectorAll('.habit-time-input')).map(i => i.value).filter(v => v);
            if (!name || times.length === 0) return;
            state.habits.push({ id: crypto.randomUUID(), name, times, createdAt: Date.now(), streak: 0 });
            state.save();
            closeModal();
            navigateTo('habits');
        }

        function toggleHabitCheck(habitId, timeIdx) {
            const today = new Date().toISOString().split('T')[0];
            if (!state.habitLogs[today]) state.habitLogs[today] = {};
            if (!state.habitLogs[today][habitId]) state.habitLogs[today][habitId] = [];
            const idx = state.habitLogs[today][habitId].indexOf(timeIdx);
            if (idx > -1) state.habitLogs[today][habitId].splice(idx, 1);
            else state.habitLogs[today][habitId].push(timeIdx);
            state.save();
            navigateTo('habits');
        }

        function deleteHabit(id) {
            if (confirm('حذف العادة؟')) {
                state.habits = state.habits.filter(h => h.id !== id);
                state.save();
                navigateTo('habits');
            }
        }

        function exportICS() {
            let ics = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//MyStudyApp//NONSGML v1.0//EN', 'CALSCALE:GREGORIAN', 'METHOD:PUBLISH'];
            state.reminders.forEach(r => r.stages.forEach(s => {
                const date = s.date.replace(/-/g, '');
                ics.push('BEGIN:VEVENT', `SUMMARY:${r.name} - ${s.label}`, `DTSTART;VALUE=DATE:${date}`, `DTEND;VALUE=DATE:${date}`, 'DESCRIPTION:مذاكرتي - تذكير ذكي', 'END:VEVENT');
            }));
            state.habits.forEach(h => h.times.forEach(t => {
                const [hh, mm] = t.split(':');
                const now = new Date();
                const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), parseInt(hh), parseInt(mm));
                const stamp = start.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
                ics.push('BEGIN:VEVENT', `SUMMARY:${h.name}`, `DTSTART:${stamp}`, `DTEND:${stamp}`, 'RRULE:FREQ=DAILY', 'DESCRIPTION:مذاكرتي - عادة يومية', 'END:VEVENT');
            }));
            ics.push('END:VCALENDAR');
            const blob = new Blob([ics.join('\r\n')], { type: 'text/calendar;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'mthakrti_calendar.ics'; a.click();
        }

        // ==========================================
        // التنبيهات والبدء
        // ==========================================
        function setupNotifications() {
            if ('Notification' in window && Notification.permission === 'default') {
                setTimeout(() => Notification.requestPermission(), 2000);
            }
            setInterval(() => {
                const now = new Date();
                const currentTime = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
                const today = now.toISOString().split('T')[0];
                state.habits.forEach(h => h.times.forEach((time, idx) => {
                    if (time === currentTime && !(state.habitLogs[today]?.[h.id]?.includes(idx))) {
                        new Notification('تذكير عادة: ' + h.name, { body: 'حان وقت ' + h.name + ' الآن!', icon: '/favicon.ico' });
                    }
                }));
            }, 60000);
        }

        // مراقبة حالة المصادقة
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN') {
                loadFromCloud();
            } else if (event === 'SIGNED_OUT') {
                state.loadLocal();
                renderApp();
            }
            updateAuthUI();
        });

        // البدء
        renderApp();
        setupNotifications();
        loadFromCloud();
    </script>
</body>
</html>
