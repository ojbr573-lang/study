<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مساعد الدراسة الذكي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f8f9fa; }
        input, button { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; }
        .btn-add { background: #34a853; color: white; cursor: pointer; border: none; }
        .btn-sync { background: #4285f4; color: white; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>مساعد الدراسة الذكي 🎓</h1>
    
    <div id="input-section">
        <input type="text" id="subject" placeholder="اسم المادة">
        <input type="datetime-local" id="date">
        <button class="btn-add" onclick="addToTable()">إضافة للجدول</button>
    </div>

    <table id="studyTable">
        <thead>
            <tr>
                <th>المادة</th>
                <th>التاريخ والوقت</th>
                <th>المزامنة مع الهاتف</th>
            </tr>
        </thead>
        <tbody>
            <!-- سيتم إضافة البيانات هنا -->
        </tbody>
    </table>
</div>

<script>
    const CLIENT_ID = '923391113467-5ur27mjjncbjrjfs20gclt8690muuolg.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyA6V8dDPLzND5wf2Q_wAKBQVlpQBI4z590';
    const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest";
    const SCOPES = "https://www.googleapis.com/auth/calendar.events";

    let tokenClient;

    function gapiLoaded() { gapi.load('client', async () => { await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] }); }); }
    function gsiLoaded() { tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: '' }); }

    function addToTable() {
        const subject = document.getElementById('subject').value;
        const date = document.getElementById('date').value;
        if(!subject || !date) return alert("عبئ البيانات!");

        const tbody = document.querySelector('#studyTable tbody');
        const row = tbody.insertRow();
        row.innerHTML = `<td>${subject}</td><td>${date}</td><td><button class="btn-sync" onclick="syncEvent('${subject}', '${date}')">مزامنة الآن 🚀</button></td>`;
    }

    function syncEvent(title, startTime) {
        tokenClient.callback = async (resp) => {
            if (resp.error) return;
            const event = {
                'summary': title,
                'start': { 'dateTime': new Date(startTime).toISOString(), 'timeZone': 'Asia/Amman' },
                'end': { 'dateTime': new Date(new Date(startTime).getTime() + 3600000).toISOString(), 'timeZone': 'Asia/Amman' }
            };
            await gapi.client.calendar.events.insert({ 'calendarId': 'primary', 'resource': event });
            alert("تمت الإضافة لتقويمك بنجاح!");
        };
        tokenClient.requestAccessToken({prompt: 'consent'});
    }
</script>

<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gsiLoaded()"></script>

</body>
</html>
