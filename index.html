<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مذاكرتي - MyStudyApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --primary-dark: #3730a3;
            --secondary: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f172a;
            --bg2: #1e293b;
            --bg3: #334155;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #64748b;
            --radius: 14px;
            --radius-sm: 8px;
            --font: 'Cairo', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font); background-color: var(--bg); color: var(--text); direction: rtl; max-width: 520px; margin: 0 auto; min-height: 100vh; }
        .container { padding: 16px; padding-bottom: 84px; }
        .card { background: var(--bg2); border-radius: var(--radius); padding: 16px; border: 1px solid var(--bg3); margin-bottom: 16px; }
        .btn { cursor: pointer; border: none; font-family: var(--font); display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; font-size: 0.95rem; }
        .btn-primary { background: var(--primary); color: white; border-radius: var(--radius-sm); padding: 10px 18px; font-weight: 700; width: 100%; }
        .input-field { background: var(--bg3); color: var(--text); border: 1px solid var(--bg3); border-radius: var(--radius-sm); padding: 10px 12px; width: 100%; margin-bottom: 12px; }
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 520px; height: 68px; background: var(--bg2); border-top: 1px solid var(--bg3); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: var(--text3); display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 0.68rem; text-decoration: none; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--primary-light); }
        header { padding: 20px 16px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary-light); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal { background: var(--bg2); width: 100%; max-width: 400px; border-radius: var(--radius); padding: 24px; border: 1px solid var(--bg3); }
        .toast { position: fixed; top: 16px; right: 16px; padding: 12px 16px; border-radius: var(--radius-sm); z-index: 9999; color: white; }
    </style>
</head>
<body>

    <header>
        <div class="logo">مذاكرتي</div>
        <div id="auth-header-info"></div>
    </header>

    <div id="app-content" class="container">
        </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="navigate('home')"><span>🏠</span><span>الرئيسية</span></div>
        <div class="nav-item" onclick="navigate('settings')"><span>⚙️</span><span>الإعدادات</span></div>
    </nav>

    <div id="modal-overlay" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal" onclick="event.stopPropagation()">
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        // --- 1. إعدادات Supabase (استبدل القيم بمفاتيحك) ---
        const SUPABASE_URL = 'https://llumspntrtdgwmodpmyc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_FXUJGp0pX57KCkdMyQWj5A_xEbKkIfD';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let state = {
            user: null,
            script_url: '',
            subjects: JSON.parse(localStorage.getItem('mz5-s')) || []
        };

        // --- 2. إدارة الدخول ---
        async function checkUser() {
            const { data: { session } } = await sb.auth.getSession();
            state.user = session?.user || null;
            if (state.user) await loadUserConfig();
            updateUI();
        }

        async function loadUserConfig() {
            const { data, error } = await sb
                .from('user_configs')
                .select('script_url')
                .eq('user_id', state.user.id)
                .single();
            if (data) state.script_url = data.script_url;
        }

        async function saveConfig() {
            const url = document.getElementById('script-url-input').value;
            const { error } = await sb
                .from('user_configs')
                .upsert({ user_id: state.user.id, script_url: url });
            
            if (!error) {
                state.script_url = url;
                alert('تم الحفظ بنجاح!');
            }
        }

        // --- 3. نظام المزامنة الذكي ---
        async function syncSchedule() {
            if (!state.user || !state.script_url) {
                alert('يرجى تسجيل الدخول وإضافة رابط Script URL أولاً');
                return;
            }

            // جلب البيانات من الداتا بيس للتأكد أننا نستخدم أحدث رابط
            await loadUserConfig();

            alert('جاري إرسال البيانات للرابط الخاص بك...');
            
            fetch(state.script_url, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(state.subjects)
            }).then(() => alert('تمت المزامنة مع تقويمك!'));
        }

        // --- 4. الواجهات ---
        function updateUI() {
            const authInfo = document.getElementById('auth-header-info');
            if (state.user) {
                authInfo.innerHTML = `<span style="font-size:0.8rem">${state.user.email}</span>`;
                renderHome();
            } else {
                authInfo.innerHTML = `<button class="btn btn-primary" onclick="showAuthModal()">دخول</button>`;
                document.getElementById('app-content').innerHTML = '<p style="text-align:center">يرجى تسجيل الدخول لحفظ بياناتك</p>';
            }
        }

        function renderHome() {
            document.getElementById('app-content').innerHTML = `
                <div class="card">
                    <h3>أهلاً بك في نظامك الخاص</h3>
                    <p>لديك ${state.subjects.length} مواد مسجلة.</p>
                    <button class="btn btn-primary" style="margin-top:15px" onclick="syncSchedule()">🚀 مزامنة المواعيد الآن</button>
                </div>
            `;
        }

        function navigate(page) {
            if (page === 'settings') {
                document.getElementById('app-content').innerHTML = `
                    <div class="card">
                        <h3>إعدادات الربط</h3>
                        <label>Google Apps Script URL</label>
                        <input type="text" id="script-url-input" class="input-field" value="${state.script_url}" placeholder="https://script.google.com/...">
                        <button class="btn btn-primary" onclick="saveConfig()">حفظ الإعدادات</button>
                    </div>
                `;
            } else { renderHome(); }
        }

        function showAuthModal() {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('modal-content').innerHTML = `
                <h2>تسجيل الدخول</h2>
                <input type="email" id="email" class="input-field" placeholder="الإيميل">
                <input type="password" id="pass" class="input-field" placeholder="كلمة السر">
                <button class="btn btn-primary" onclick="handleAuth()">دخول / تسجيل</button>
            `;
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            
            // محاولة الدخول، إذا فشل يحاول التسجيل (ببساطة)
            let { error } = await sb.auth.signInWithPassword({ email, password });
            if (error) {
                const { error: signUpError } = await sb.auth.signUp({ email, password });
                if (signUpError) alert(signUpError.message);
                else alert('تم إنشاء حساب! تحقق من بريدك');
            }
            
            document.getElementById('modal-overlay').style.display = 'none';
            checkUser();
        }

        // ابدأ التشغيل
        checkUser();
    </script>
</body>
</html>
