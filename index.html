<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مساعد الدراسة الذكي - المزامنة السحابية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; }
        .input-group { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f8f9fa; }
        input, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; margin: 5px; }
        .btn-add { background: #34a853; color: white; cursor: pointer; border: none; font-weight: bold; }
        .btn-sync { background: #4285f4; color: white; cursor: pointer; border: none; font-weight: bold; }
        .status-ok { color: #34a853; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>مساعد الدراسة الذكي 🎓</h1>
    <p>أضف مواعيدك وسيتم إرسالها لتقويم هاتفك مباشرة عبر السحابة.</p>
    
    <div class="input-group">
        <input type="text" id="subject" placeholder="اسم المادة">
        <input type="datetime-local" id="date">
        <button class="btn-add" onclick="addToTable()">إضافة للقائمة</button>
    </div>

    <table id="studyTable">
        <thead>
            <tr>
                <th>المادة</th>
                <th>الموعد</th>
                <th>المزامنة مع الهاتف</th>
            </tr>
        </thead>
        <tbody>
            <!-- تظهر المواعيد هنا -->
        </tbody>
    </table>
</div>

<script>
    // الرابط الذي قمت بإنشائه في Google Apps Script
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyf13dkl9V0gVXarDYLp2soriiesGsLUXSyPkuMc4gYj2qOd0eAc5BKA_REj_Ax7Y1sHA/exec';

    function addToTable() {
        const subject = document.getElementById('subject').value;
        const date = document.getElementById('date').value;
        if(!subject || !date) return alert("يرجى إدخال البيانات!");

        const tbody = document.querySelector('#studyTable tbody');
        const row = tbody.insertRow();
        const rowId = 'row-' + Date.now();
        row.id = rowId;
        
        row.innerHTML = `
            <td>${subject}</td>
            <td>${new Date(date).toLocaleString('ar-JO')}</td>
            <td id="status-${rowId}">
                <button class="btn-sync" onclick="syncWithGAS('${subject}', '${date}', '${rowId}')">مزامنة سحابية 🚀</button>
            </td>`;
    }

    async function syncWithGAS(title, startTime, rowId) {
        const statusCell = document.getElementById('status-' + rowId);
        const originalContent = statusCell.innerHTML;
        statusCell.innerText = "جاري الإرسال... ⏳";

        const data = {
            title: title,
            startTime: startTime
        };

        try {
            // إرسال البيانات إلى Google Apps Script
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', // لتجنب قيود الـ CORS
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            statusCell.innerHTML = '<span class="status-ok">✅ تمت المزامنة</span>';
            alert("رائع! الموعد الآن في تقويم هاتفك.");
        } catch (error) {
            console.error('Error:', error);
            statusCell.innerHTML = originalContent;
            alert("حدث خطأ أثناء الاتصال بالسحابة.");
        }
    }
</script>

</body>
</html>
