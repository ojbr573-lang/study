<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مذاكرتي - MyStudyApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --primary-dark: #3730a3;
            --secondary: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f172a;
            --bg2: #1e293b;
            --bg3: #334155;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #64748b;
            --radius: 14px;
            --radius-sm: 8px;
            --font: 'Cairo', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            direction: rtl;
            max-width: 520px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== التنسيقات العامة ===== */
        .container {
            padding: 16px;
            padding-bottom: 84px;
        }

        .card {
            background: var(--bg2);
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--bg3);
            margin-bottom: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            cursor: pointer;
            border: none;
            font-family: var(--font);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border-radius: var(--radius-sm);
            padding: 10px 18px;
            font-weight: 700;
            width: 100%;
        }

        .btn-secondary {
            background: var(--bg3);
            color: var(--text);
            border-radius: var(--radius-sm);
            padding: 10px 18px;
            width: 100%;
        }

        .btn-icon {
            background: var(--bg3);
            color: var(--text);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            padding: 0;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            font-size: 0.85rem;
        }

        .input-field {
            background: var(--bg3);
            color: var(--text);
            border: 1px solid var(--bg3);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            width: 100%;
            font-family: var(--font);
            margin-bottom: 12px;
        }

        .input-field:focus {
            border-color: var(--primary-light);
            outline: none;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: var(--text2);
        }

        /* ===== شريط التنقل السفلي ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 520px;
            height: 68px;
            background: var(--bg2);
            border-top: 1px solid var(--bg3);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-item {
            color: var(--text3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 0.68rem;
            text-decoration: none;
            flex: 1;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 1.4rem;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: var(--primary-light);
        }

        /* ===== الهيدر ===== */
        header {
            padding: 20px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-light);
        }

        .user-badge {
            font-size: 0.8rem;
            color: var(--text2);
            background: var(--bg2);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--bg3);
        }

        /* ===== الإحصائيات ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--bg2);
            padding: 12px;
            border-radius: var(--radius);
            border: 1px solid var(--bg3);
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-light);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text2);
        }

        /* ===== التذكيرات القادمة ===== */
        .reminder-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--bg3);
        }

        .reminder-item:last-child {
            border-bottom: none;
        }

        .reminder-info h4 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .reminder-info p {
            font-size: 0.75rem;
            color: var(--text2);
        }

        .days-left {
            font-size: 0.8rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .days-left.urgent { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .days-left.soon { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .days-left.later { background: rgba(16, 185, 129, 0.2); color: var(--success); }

        /* ===== المواد ===== */
        .subject-card {
            position: relative;
            overflow: hidden;
        }

        .subject-color-bar {
            position: absolute;
            top: 0;
            right: 0;
            width: 6px;
            height: 100%;
        }

        .subject-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .subject-title {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .progress-container {
            height: 8px;
            background: var(--bg3);
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s;
        }

        .chapter-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            font-size: 0.9rem;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--bg3);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .checkbox.checked {
            background: var(--success);
            border-color: var(--success);
        }

        .checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .chapter-name.done {
            text-decoration: line-through;
            color: var(--text3);
        }

        /* ===== التذكيرات ===== */
        .timeline {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stage-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-sm);
        }

        .stage-date {
            font-size: 0.75rem;
            color: var(--text2);
            min-width: 80px;
        }

        /* ===== العادات ===== */
        .habit-progress-banner {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            text-align: center;
        }

        .habit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }

        .habit-time-btn {
            background: var(--bg3);
            border: 1px solid transparent;
            padding: 8px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            text-align: center;
            cursor: pointer;
        }

        .habit-time-btn.done {
            background: rgba(16, 185, 129, 0.2);
            border-color: var(--success);
            color: var(--success);
        }

        /* ===== المودال ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal {
            background: var(--bg2);
            width: 100%;
            max-width: 400px;
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--bg3);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-weight: 800;
            font-size: 1.2rem;
        }

        /* ===== التوست ===== */
        .toast {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            z-index: 9999;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast-success { background: var(--success); color: white; }
        .toast-error { background: var(--danger); color: white; }
        .toast-info { background: var(--primary); color: white; }

        /* ===== الألوان ===== */
        .color-picker {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .color-option {
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .color-option.selected {
            border-color: white;
        }

        /* ===== إخفاء العناصر ===== */
        .hidden { display: none !important; }

        /* ===== أيقونات بسيطة ===== */
        .icon { width: 20px; height: 20px; display: inline-block; vertical-align: middle; }
    </style>
</head>
<body>

    <header>
        <div class="logo">مذاكرتي</div>
        <div id="auth-header-info"></div>
    </header>

    <div id="app-content" class="container">
        <!-- المحتوى سيتم توليده هنا -->
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="navigate('home')">
            <span>🏠</span>
            <span>الرئيسية</span>
        </div>
        <div class="nav-item" onclick="navigate('subjects')">
            <span>📚</span>
            <span>المواد</span>
        </div>
        <div class="nav-item" onclick="navigate('reminders')">
            <span>🔔</span>
            <span>التذكيرات</span>
        </div>
        <div class="nav-item" onclick="navigate('habits')">
            <span>🦷</span>
            <span>عادات</span>
        </div>
    </nav>

    <!-- مودال عام -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- توست -->
    <div id="toast-container"></div>

    <script>
        // ===== الإعدادات الثابتة =====
        const SUPABASE_URL = 'https://llumspntrtdgwmodpmyc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_FXUJGp0pX57KCkdMyQWj5A_xEbKkIfD';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const STORAGE_KEYS = {
            subjects: 'mthakrti_subjects',
            reminders: 'mthakrti_reminders',
            habits: 'mthakrti_habits',
            habitLogs: 'mthakrti_habitLogs',
            gasConfig: 'mthakrti_gasConfig'
        };

        const SUBJECT_COLORS = ['#4f46e5', '#06b6d4', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#8b5cf6', '#f97316', '#14b8a6', '#6366f1'];

        // ===== حالة التطبيق =====
        let state = {
            currentPage: 'home',
            user: null,
            subjects: JSON.parse(localStorage.getItem(STORAGE_KEYS.subjects)) || [],
            reminders: JSON.parse(localStorage.getItem(STORAGE_KEYS.reminders)) || [],
            habits: JSON.parse(localStorage.getItem(STORAGE_KEYS.habits)) || [
                { id: 'default-1', name: '🦷 تفريش الأسنان', times: ['07:30', '22:00'] }
            ],
            habitLogs: JSON.parse(localStorage.getItem(STORAGE_KEYS.habitLogs)) || {},
            gasConfig: JSON.parse(localStorage.getItem(STORAGE_KEYS.gasConfig)) || { url: '', secret: '' }
        };

        // ===== تهيئة التطبيق =====
        async function init() {
            try {
                const { data: { session } } = await sb.auth.getSession();
                if (session) {
                    state.user = session.user;
                    await loadFromCloud();
                }
                updateAuthUI();
                renderAll();
                requestNotificationPermission();
                startNotificationCheck();
            } catch (e) {
                console.error('Init Error:', e);
                renderAll();
            }
        }

        // ===== إدارة المصادقة =====
        sb.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN') {
                state.user = session.user;
                loadFromCloud();
            } else if (event === 'SIGNED_OUT') {
                state.user = null;
            }
            updateAuthUI();
            renderAll();
        });

        function updateAuthUI() {
            const headerInfo = document.getElementById('auth-header-info');
            if (state.user) {
                headerInfo.innerHTML = `
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span class="user-badge">${state.user.email}</span>
                        <button class="btn btn-icon" onclick="handleLogout()" title="خروج">🚪</button>
                    </div>
                `;
            } else {
                headerInfo.innerHTML = `
                    <button class="btn btn-primary" style="width:auto; padding:6px 12px; font-size:0.8rem;" onclick="openAuthModal()">دخول</button>
                `;
            }
        }

        function openAuthModal() {
            showModal(`
                <div class="modal-header">
                    <div class="modal-title">تسجيل الدخول</div>
                    <button class="btn btn-icon" onclick="closeModal()">✕</button>
                </div>
                <div id="auth-form">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="auth-email" class="input-field" placeholder="example@mail.com">
                    <label>كلمة المرور</label>
                    <input type="password" id="auth-password" class="input-field" placeholder="••••••••">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
                        <button class="btn btn-primary" onclick="handleLogin()">دخول</button>
                        <button class="btn btn-secondary" onclick="handleSignUp()">تسجيل جديد</button>
                    </div>
                </div>
            `);
        }

        async function handleLogin() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if (!email || !password) return showToast('يرجى ملء كافة الحقول', 'error');

            const btn = document.querySelector('#auth-form .btn-primary');
            btn.disabled = true;
            btn.innerText = 'جاري الدخول...';

            try {
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) {
                    if (error.message.includes('Email not confirmed')) {
                        showToast('البريد الإلكتروني لم يتم تأكيده بعد', 'error');
                        showResendOption(email);
                        return;
                    }
                    throw error;
                }
                showToast('تم تسجيل الدخول بنجاح', 'success');
                closeModal();
            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = 'دخول';
            }
        }

        function showResendOption(email) {
            const form = document.getElementById('auth-form');
            const resendDiv = document.createElement('div');
            resendDiv.style.marginTop = '15px';
            resendDiv.style.padding = '10px';
            resendDiv.style.background = 'rgba(245, 158, 11, 0.1)';
            resendDiv.style.borderRadius = 'var(--radius-sm)';
            resendDiv.style.border = '1px solid var(--warning)';
            resendDiv.innerHTML = `
                <p style="font-size:0.8rem; margin-bottom:8px; color:var(--warning);">هل تريد إعادة إرسال رابط التأكيد؟</p>
                <button class="btn btn-secondary" style="font-size:0.8rem; padding:6px;" onclick="handleResendConfirmation('${email}')">إعادة إرسال الرابط 📧</button>
            `;
            // إزالة أي رسالة سابقة
            const old = document.getElementById('resend-container');
            if (old) old.remove();
            resendDiv.id = 'resend-container';
            form.appendChild(resendDiv);
        }

        async function handleResendConfirmation(email) {
            const btn = document.querySelector('#resend-container button');
            btn.disabled = true;
            btn.innerText = 'جاري الإرسال...';
            try {
                // في Supabase، إعادة الإرسال تتم عبر signUp مرة أخرى لنفس الإيميل أو عبر دالة مخصصة إذا كانت متوفرة
                // الطريقة الأضمن هي استخدام resend
                const { error } = await sb.auth.resend({
                    type: 'signup',
                    email: email
                });
                if (error) throw error;
                showToast('تم إرسال رابط التأكيد، تفقد بريدك', 'success');
            } catch (e) {
                if (e.message.includes('rate limit')) {
                    showToast('تم تجاوز حد الإرسال، يرجى المحاولة بعد ساعة', 'error');
                } else {
                    showToast(e.message, 'error');
                }
            } finally {
                btn.disabled = false;
                btn.innerText = 'إعادة إرسال الرابط 📧';
            }
        }

        async function handleSignUp() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if (!email || !password) return showToast('يرجى ملء كافة الحقول', 'error');

            const btn = document.querySelector('#auth-form .btn-secondary');
            btn.disabled = true;
            btn.innerText = 'جاري التسجيل...';

            try {
                const { error } = await sb.auth.signUp({ email, password });
                if (error) {
                    if (error.message.includes('rate limit')) {
                        showToast('تم تجاوز حد الطلبات، يرجى المحاولة لاحقاً (بعد ساعة تقريباً)', 'error');
                        return;
                    }
                    throw error;
                }
                showToast('تحقق من بريدك الإلكتروني لتأكيد الحساب', 'info');
                closeModal();
            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = 'تسجيل جديد';
            }
        }

        async function handleLogout() {
            try {
                await sb.auth.signOut();
                showToast('تم تسجيل الخروج', 'info');
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        // ===== مزامنة السحاب =====
        async function syncToCloud() {
            if (!state.user) return openAuthModal();

            showToast('جاري المزامنة...', 'info');
            try {
                const payload = {
                    user_id: state.user.id,
                    script_url: JSON.stringify(state.gasConfig),
                    study_data: {
                        subjects: state.subjects,
                        reminders: state.reminders,
                        habits: state.habits,
                        habitLogs: state.habitLogs
                    }
                };

                const { error } = await sb
                    .from('user_configs')
                    .upsert(payload, { onConflict: 'user_id' });

                if (error) throw error;
                showToast('تمت المزامنة بنجاح ✅', 'success');
            } catch (e) {
                showToast('فشلت المزامنة: ' + e.message, 'error');
            }
        }

        async function loadFromCloud() {
            if (!state.user) return;

            try {
                const { data, error } = await sb
                    .from('user_configs')
                    .select('*')
                    .eq('user_id', state.user.id)
                    .single();

                if (error && error.code !== 'PGRST116') throw error;

                if (data) {
                    if (data.script_url) {
                        state.gasConfig = JSON.parse(data.script_url);
                        localStorage.setItem(STORAGE_KEYS.gasConfig, data.script_url);
                    }
                    if (data.study_data) {
                        const d = data.study_data;
                        state.subjects = d.subjects || [];
                        state.reminders = d.reminders || [];
                        state.habits = d.habits || state.habits;
                        state.habitLogs = d.habitLogs || {};
                        saveAllLocal();
                        renderAll();
                    }
                }
            } catch (e) {
                console.error('Load Error:', e);
            }
        }

        // ===== التنقل =====
        function navigate(page) {
            state.currentPage = page;
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            const index = ['home', 'subjects', 'reminders', 'habits'].indexOf(page);
            document.querySelectorAll('.nav-item')[index].classList.add('active');
            renderAll();
        }

        // ===== الحفظ المحلي =====
        function saveAllLocal() {
            localStorage.setItem(STORAGE_KEYS.subjects, JSON.stringify(state.subjects));
            localStorage.setItem(STORAGE_KEYS.reminders, JSON.stringify(state.reminders));

        function renderUpcomingReminders() {
            const list = document.getElementById('upcoming-reminders-list');
            const now = new Date();
            
            // جمع كافة المراحل القادمة
            let allStages = [];
            state.reminders.forEach(rem => {
                const stages = generateStages(rem.date, rem.type);
                stages.forEach((s, idx) => {
                    const stageDate = new Date(s.date);
                    if (stageDate >= now && (!rem.doneStages || !rem.doneStages.includes(idx))) {
                        allStages.push({
                            title: rem.name,
                            stageName: s.label,
                            date: stageDate,
                            remId: rem.id
                        });
                    }
                });
            });

            allStages.sort((a, b) => a.date - b.date);
            const top5 = allStages.slice(0, 5);

            if (top5.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:var(--text3); font-size:0.9rem;">لا توجد تذكيرات قادمة</p>';
                return;
            }

            top5.forEach(s => {
                const diffTime = s.date - now;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                let colorClass = 'later';
                if (diffDays <= 2) colorClass = 'urgent';
                else if (diffDays <= 5) colorClass = 'soon';

                const div = document.createElement('div');
                div.className = 'reminder-item';
                div.innerHTML = `
                    <div class="reminder-info">
                        <h4>${s.title}</h4>
                        <p>${s.stageName} - ${s.date.toLocaleDateString('ar-EG')}</p>
                    </div>
                    <div class="days-left ${colorClass}">${diffDays} أيام</div>
                `;
                list.appendChild(div);
            });
        }

        function generateStages(dateStr, type) {
            const targetDate = new Date(dateStr);
            const stages = [];
            const dayMs = 24 * 60 * 60 * 1000;

            const addStage = (daysBefore, label) => {
                const d = new Date(targetDate.getTime() - daysBefore * dayMs);
                stages.push({ date: d.toISOString().split('T')[0], label });
            };

            if (type === 'exam') {
                [14, 7, 3, 1].forEach(d => addStage(d, `مراجعة قبل ${d} أيام`));
            } else if (type === 'quiz') {
                [3, 1].forEach(d => addStage(d, `مراجعة قبل ${d} أيام`));
            } else if (type === 'assignment') {
                [7, 3, 1].forEach(d => addStage(d, `عمل قبل ${d} أيام`));
            } else {
                addStage(2, 'تذكير نهائي');
            }

            stages.push({ date: dateStr, label: 'اليوم الموعود 🎯' });
            return stages;
        }

        async function syncToGoogleCalendar() {
            const btn = document.querySelector('.modal .btn-primary');
            btn.disabled = true;
            btn.innerText = 'جاري الإرسال...';

            try {
                const now = new Date();
                let events = [];

                state.reminders.forEach(rem => {
                    const stages = generateStages(rem.date, rem.type);
                    stages.forEach(s => {
                        const stageDate = new Date(s.date);
                        if (stageDate >= now) {
                            events.push({
                                title: `${rem.name} - ${s.label}`,
                                startTime: s.date + 'T09:00:00',
                                durationMinutes: 30,
                                description: 'تذكير من تطبيق مذاكرتي',
                                reminderMinutes: 60
                            });
                        }
                    });
                });

                // إرسال الأحداث واحداً تلو الآخر (أو كدفعة إذا كان GAS يدعم ذلك)
                for (const ev of events) {
                    await fetch(state.gasConfig.url, {
                        method: 'POST',
                        mode: 'no-cors', // GAS غالباً ما يتطلب no-cors إذا لم يتم إعداد CORS
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ ...ev, secret: state.gasConfig.secret })
                    });
                }

                showToast('تم إرسال الأحداث للتقويم ✅', 'success');
                closeModal();
            } catch (e) {
                showToast('فشل الاتصال بـ GAS', 'error');
            } finally {
                btn.disabled = false;
            }
        }

        // ===== تصدير ICS =====
        function exportICS() {
            let icsContent = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//MyStudyApp//NONSGML v1.0//EN\nCALSCALE:GREGORIAN\nMETHOD:PUBLISH\n";

            // التذكيرات
            state.reminders.forEach(rem => {
                const stages = generateStages(rem.date, rem.type);
                stages.forEach(s => {
                    const d = s.date.replace(/-/g, '');
                    icsContent += "BEGIN:VEVENT\n";
                    icsContent += `DTSTART;VALUE=DATE:${d}\n`;
                    icsContent += `DTEND;VALUE=DATE:${d}\n`;
                    icsContent += `SUMMARY:${rem.name} - ${s.label}\n`;
                    icsContent += "DESCRIPTION:تذكير من تطبيق مذاكرتي\n";
                    icsContent += "END:VEVENT\n";
                });
            });

            // العادات
            state.habits.forEach(h => {
                h.times.forEach(t => {
                    const time = t.replace(':', '') + '00';
                    icsContent += "BEGIN:VEVENT\n";
                    icsContent += `DTSTART:20240101T${time}\n`;
                    icsContent += `RRULE:FREQ=DAILY\n`;
                    icsContent += `SUMMARY:عادة: ${h.name}\n`;
                    icsContent += "END:VEVENT\n";
                });
            });

            icsContent += "END:VCALENDAR";

            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.setAttribute('download', 'مذاكرتي.ics');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // ===== الإشعارات =====
        function requestNotificationPermission() {
            setTimeout(() => {
                if ("Notification" in window && Notification.permission === "default") {
                    Notification.requestPermission();
                }
            }, 2000);
        }

        function startNotificationCheck() {
            setInterval(() => {
                const now = new Date();
                const hhmm = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                const today = now.toISOString().split('T')[0];

                state.habits.forEach(h => {
                    if (h.times.includes(hhmm)) {
                        const logs = state.habitLogs[today] || {};
                        const habitLogs = logs[h.id] || [];
                        const timeIdx = h.times.indexOf(hhmm);

                        if (!habitLogs.includes(timeIdx)) {
                            if (Notification.permission === "granted") {
                                new Notification("مذاكرتي - تذكير عادة", {
                                    body: `حان وقت: ${h.name}`,
                                    icon: "https://cdn-icons-png.flaticon.com/512/3271/3271314.png"
                                });
                            }
                        }
                    }
                });
            }, 60000);
        }

        // ===== وظائف مساعدة للمودال والتوست =====
        function showModal(html) {
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal(e) {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // تشغيل التطبيق
        init();
    </script>
</body>
</html>
